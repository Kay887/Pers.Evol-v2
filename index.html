<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pers.Evol">
<title>Pers.Evol — v2</title>
<style>
:root{
  --bg:#07070f;--s1:#0f0f1a;--s2:#161624;--s3:#1e1e2e;--s4:#252538;
  --b1:#28283e;--b2:#333350;
  --t1:#eeeef8;--t2:#8080a8;--t3:#484868;
  --gold:#c9965a;--gl:#e8b068;
  --red:#d95050;--green:#4aaa78;--blue:#4a7ee0;
  --purple:#8858d8;--orange:#d87844;--teal:#3aa898;--pink:#d85880;--cyan:#38b2c8;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,sans-serif;overscroll-behavior:none}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:var(--b1);border-radius:2px}
input,textarea,select,button{font-family:inherit;-webkit-appearance:none}
textarea{resize:vertical}

/* layout */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
#topbar{background:var(--s1);border-bottom:1px solid var(--b1);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:30}
#groupnav{background:var(--s1);border-bottom:1px solid var(--b1);padding:6px 14px;display:flex;gap:6px;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch}
#subnav{background:var(--bg);border-bottom:1px solid rgba(255,255,255,0.04);padding:0 12px;display:flex;overflow-x:auto;flex-shrink:0}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.panel{display:none;padding:16px;max-width:760px;margin:0 auto;padding-bottom:100px}
.panel.active{display:block}
#groupnav::-webkit-scrollbar,#subnav::-webkit-scrollbar{display:none}

/* topbar */
.tbl h1{font-family:Georgia,serif;font-size:15px;color:var(--gl);font-style:italic;letter-spacing:.3px}
.tbl p{font-size:10px;color:var(--t3);font-family:monospace;margin-top:1px}
.tbr{display:flex;align-items:center;gap:10px}
.opct span{font-family:monospace;font-size:20px;font-weight:700;color:var(--gold);display:block;line-height:1}
.opct small{font-size:8px;color:var(--t3);letter-spacing:2px;text-transform:uppercase}
#menu-btn{width:36px;height:36px;border-radius:9px;border:1px solid var(--b1);background:var(--s2);color:var(--t2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* nav */
.gpill{padding:5px 13px;border-radius:20px;border:1px solid var(--b1);background:transparent;color:var(--t3);font-size:12px;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px;transition:all .18s;flex-shrink:0}
.stab{padding:9px 13px;cursor:pointer;white-space:nowrap;flex-shrink:0;border-bottom:2px solid transparent;color:var(--t3);font-size:12.5px;display:flex;align-items:center;gap:5px;transition:all .15s;user-select:none}

/* drawer */
#drawer{position:fixed;inset:0;z-index:100;display:none}
#drawer.open{display:block}
#dbg{position:absolute;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px)}
#dpanel{position:absolute;top:0;right:0;bottom:0;width:280px;background:var(--s1);border-left:1px solid var(--b1);overflow-y:auto}
.dr-head{padding:18px 18px 12px;border-bottom:1px solid var(--b1);display:flex;justify-content:space-between;align-items:center}
.dr-head span{font-family:Georgia,serif;font-size:14px;color:var(--gl);font-style:italic}
#dr-close{background:none;border:none;color:var(--t3);font-size:18px;cursor:pointer}
.dr-sec{padding:10px 0}
.dr-lbl{padding:4px 18px 6px;font-size:10px;color:var(--t3);letter-spacing:2.5px;text-transform:uppercase;font-weight:600}
.dr-item{display:flex;align-items:center;gap:11px;padding:10px 18px;cursor:pointer;border-left:3px solid transparent;transition:all .15s}
.dr-item.on{background:rgba(255,255,255,.04)}
.dr-item .di-icon{font-size:15px;width:20px;text-align:center}
.dr-item .din{flex:1}
.dr-item .din h4{font-size:13px;font-weight:500}
.dr-item .din p{font-size:10px;color:var(--t3);margin-top:1px}
.dr-item .dipct{font-size:11px;font-family:monospace;font-weight:600}
.dr-footer{margin:8px 14px 20px;padding:14px;background:var(--s2);border-radius:10px;border:1px solid var(--b1);text-align:center}

/* cards / layout */
.card{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:18px;margin-bottom:14px}
.ct{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.ct strong{font-family:monospace;color:var(--gl);font-size:12px;font-weight:700;letter-spacing:0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.tile{background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:14px}
.tile .tl{font-size:10px;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.tile .tv{font-family:monospace;font-size:22px;font-weight:700;line-height:1;margin-bottom:3px}
.tile .ts{font-size:11px;color:var(--t3)}
.pbar{height:5px;background:var(--s3);border-radius:3px;overflow:hidden;margin:6px 0}
.pbar-f{height:100%;border-radius:3px;transition:width .8s ease}
.chk{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--b2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;flex-shrink:0;transition:all .2s;user-select:none}
.chk.on{background:var(--green);border-color:var(--green)}
.btn{padding:9px 18px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.bg{background:var(--gold);color:#07070f}.bg:hover{background:var(--gl)}
.bgh{background:var(--s2);color:var(--t2);border:1px solid var(--b2)}
.inp{background:var(--s2);border:1px solid var(--b2);border-radius:8px;color:var(--t1);padding:9px 12px;font-size:13px;outline:none;transition:border-color .2s;width:100%}
.inp:focus{border-color:var(--gold)}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--s4);border:1px solid var(--b2);border-radius:10px;padding:11px 20px;font-size:13px;z-index:999;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.6);max-width:320px;text-align:center}
#toast.show{opacity:1}

/* sync */
#sync-bar{position:fixed;top:0;left:0;right:0;height:2px;z-index:200;pointer-events:none}
#sync-bar.active{background:linear-gradient(90deg,transparent,var(--gold),transparent);animation:sb 1.2s infinite}
@keyframes sb{0%,100%{opacity:.4}50%{opacity:1}}
#sync-dot{font-size:10px;font-family:monospace;color:var(--t3)}

/* neurix */
#nx-btn{position:fixed;bottom:24px;right:20px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#1a0a2e,#0d1a3a);border:2px solid rgba(136,88,216,.6);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:50;box-shadow:0 4px 20px rgba(88,58,168,.4);font-size:22px;transition:all .3s}
#nx-btn:hover{transform:scale(1.08)}
#nx-panel{position:fixed;bottom:86px;right:16px;width:320px;background:linear-gradient(160deg,#0d0d1e,#121228);border:1px solid rgba(136,88,216,.3);border-radius:16px;z-index:50;display:none;overflow:hidden;box-shadow:0 16px 48px rgba(0,0,0,.8)}
#nx-panel.open{display:block}
.nxh{padding:14px 16px;border-bottom:1px solid rgba(136,88,216,.2);display:flex;align-items:center;gap:10px}
.nxhi h4{font-size:13px;color:var(--purple);font-weight:600}
.nxhi p{font-size:10px;color:var(--t3)}
.nxcl{margin-left:auto;background:none;border:none;color:var(--t3);cursor:pointer;font-size:16px}
#nx-msgs{height:200px;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.nxm{font-size:12px;line-height:1.6;padding:8px 12px;border-radius:8px;max-width:85%}
.nxm.ai{background:rgba(136,88,216,.12);color:var(--t2);border:1px solid rgba(136,88,216,.15);align-self:flex-start}
.nxm.user{background:rgba(201,150,90,.1);color:var(--t2);border:1px solid rgba(201,150,90,.2);align-self:flex-end}
.nxir{display:flex;gap:8px;padding:10px 12px;border-top:1px solid rgba(136,88,216,.15)}
#nx-inp{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(136,88,216,.2);border-radius:8px;color:var(--t1);padding:8px 10px;font-size:12px;outline:none}
#nx-send{background:var(--purple);color:#fff;border:none;border-radius:8px;padding:8px 12px;cursor:pointer;font-size:12px}

/* rings */
.ring-track{fill:none;stroke-width:16;opacity:.15}
.ring-fill{fill:none;stroke-width:16;stroke-linecap:round;transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)}
.ring-glow{fill:none;stroke-width:22;stroke-linecap:round;opacity:.15;transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)}

/* kanban */
.kb{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;overflow-x:auto;min-width:600px}
.kbc{background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:12px;min-height:180px}
.kbch{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.kbcard{background:var(--s3);border:1px solid var(--b1);border-radius:8px;padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:all .2s}
.kbcard:hover{border-color:var(--b2);transform:translateY(-1px)}
.kbcard h5{font-size:12px;font-weight:500;color:var(--t1);line-height:1.4;margin-bottom:4px}
.kbcard p{font-size:10px;color:var(--t3);line-height:1.4}

/* intimacy steps */
.step-card{background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:14px;margin-bottom:10px;transition:all .2s}
.step-card.current{border-color:var(--teal);background:rgba(58,168,152,.06)}
.step-card.done{border-color:var(--green);background:rgba(74,170,120,.05)}
.star{font-size:18px;cursor:pointer;transition:transform .15s;color:var(--t3)}
.star.lit{color:#f5c518}

/* journal */
.jp{margin-bottom:16px;background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:16px;transition:all .25s}
.jp.filled{border-color:rgba(201,150,90,.25)}
.jp h4{font-family:Georgia,serif;font-size:14px;font-style:italic;color:var(--t1);margin-bottom:3px}
.jp p{font-size:11px;color:var(--t3);line-height:1.6}
.jta{width:100%;background:rgba(255,255,255,.02);border:1px solid var(--b1);border-radius:8px;color:var(--t1);padding:11px 13px;font-size:13px;font-family:Georgia,serif;line-height:1.85;min-height:80px;outline:none;transition:border-color .2s}
.jta:focus{border-color:rgba(201,150,90,.45);box-shadow:0 0 0 3px rgba(201,150,90,.06)}
.qblock{background:linear-gradient(160deg,rgba(201,150,90,.07),rgba(7,7,15,.6));border:1px solid rgba(201,150,90,.16);border-radius:16px;padding:28px 22px;text-align:center;position:relative;overflow:hidden;margin-top:20px}
.qblock::before{content:'"';position:absolute;top:-10px;left:16px;font-family:Georgia,serif;font-size:80px;color:rgba(201,150,90,.1);line-height:1;pointer-events:none}
.qt{font-family:Georgia,serif;font-size:15px;color:var(--t2);line-height:1.9;font-style:italic;margin-bottom:14px}
.qa{display:inline-block;font-size:10px;color:var(--gold);letter-spacing:2.5px;text-transform:uppercase;padding:3px 14px;border:1px solid rgba(201,150,90,.22);border-radius:20px;background:rgba(201,150,90,.06)}
.qf{font-size:9px;color:var(--t3);font-family:monospace;letter-spacing:1.5px;margin-top:14px}

/* goals */
.gcats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.gcat{padding:5px 12px;border-radius:20px;border:1px solid var(--b1);background:transparent;color:var(--t3);font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap}
.ms-row{display:flex;gap:12px;align-items:center;padding:11px 0;border-bottom:1px solid var(--b1);cursor:pointer}
.ms-row:last-child{border:none}
.ms-chk{width:22px;height:22px;border-radius:50%;border:2px solid var(--b2);display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;flex-shrink:0;transition:all .2s}
.ms-row.achieved .ms-chk{background:var(--green);border-color:var(--green);color:#fff}

/* sprints */
.sprint{background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.sprint-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.sprint-hd h4{font-size:12px;font-weight:500;color:var(--t1)}

/* phase items */
.pi{display:flex;align-items:flex-start;gap:11px;padding:9px 0;border-bottom:1px solid var(--b1);cursor:pointer}
.pi:last-child{border:none}
.pi span{font-size:13px;color:var(--t2);line-height:1.5}
.pi.done span{text-decoration:line-through;color:var(--t3)}

/* water drops */
.drops{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.drop{width:30px;height:30px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .15s;border:1px solid var(--b1);background:var(--s2)}
.drop.on{background:rgba(74,126,224,.15);border-color:var(--blue)}

/* mindmap */
#mm-svg{width:100%;height:480px;background:radial-gradient(ellipse at center,#0d0d22 0%,var(--bg) 70%)}
.mm-node{cursor:pointer}
.mm-node circle{transition:all .3s}

@keyframes ringPulse{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .35s ease both}

/* week grid */
.wgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:8px}
.wday{aspect-ratio:1;border-radius:6px;background:var(--s2);border:1px solid var(--b1);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;color:var(--t3)}
.wday.ex{background:rgba(74,170,120,.12);border-color:var(--green);color:var(--green)}
.wday.td{border-color:var(--gold);color:var(--gold)}

.sl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin-bottom:10px;display:flex;justify-content:space-between}
.sl strong{font-family:monospace;color:var(--gl);letter-spacing:0;font-size:12px}
.info-bar{padding:10px 14px;border-radius:8px;margin-bottom:14px;font-size:12px;line-height:1.7}

@media(max-width:480px){.kb{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:1fr 1fr}}

/* ── PIN LOCK SCREEN ── */
#pin-screen{position:fixed;inset:0;z-index:9999;background:#07070f;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
#pin-screen.unlocked{display:none}
.pin-logo{font-family:Georgia,serif;font-size:28px;color:#e8b068;font-style:italic;margin-bottom:6px;letter-spacing:.3px}
.pin-sub{font-size:10px;color:#484868;font-family:monospace;letter-spacing:3px;text-transform:uppercase;margin-bottom:40px}
.pin-title{font-size:13px;color:#8080a8;font-family:monospace;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:20px;text-align:center}
.pin-dots{display:flex;gap:14px;margin-bottom:32px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid #333350;background:transparent;transition:all .15s}
.pin-dot.filled{background:#c9965a;border-color:#c9965a;box-shadow:0 0 8px rgba(201,150,90,.5)}
.pin-dot.error{background:#d95050;border-color:#d95050;animation:pinShake .3s ease}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:240px;width:100%}
.pin-key{height:60px;border-radius:12px;border:1px solid #28283e;background:#0f0f1a;color:#eeeef8;font-size:20px;font-family:monospace;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;user-select:none;-webkit-tap-highlight-color:transparent}
.pin-key:active{background:#1e1e2e;border-color:#c9965a;transform:scale(.95)}
.pin-key.del{font-size:16px;color:#8080a8}
.pin-key.empty{border:none;background:transparent;cursor:default}
.pin-msg{font-size:11px;color:#8080a8;font-family:monospace;margin-top:16px;text-align:center;min-height:16px}
.pin-msg.error{color:#d95050}
.pin-msg.success{color:#4aaa78}
.pin-change-btn{margin-top:20px;background:none;border:1px solid #28283e;color:#484868;font-size:10px;font-family:monospace;padding:6px 14px;border-radius:6px;cursor:pointer;letter-spacing:1px}
.pin-change-btn:hover{color:#8080a8;border-color:#333350}
@keyframes pinShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes pinUnlock{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(.97)}}
.pin-unlocking{animation:pinUnlock .25s ease forwards}
</style>
</head>
<body>

<!-- PIN LOCK SCREEN -->
<div id="pin-screen">
  <div class="pin-logo">Pers.Evol</div>
  <div class="pin-sub">Personal Evolution · v2</div>
  <div class="pin-title" id="pin-title">Enter PIN</div>
  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot" id="pd0"></div>
    <div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div>
    <div class="pin-dot" id="pd3"></div>
    <div class="pin-dot" id="pd4"></div>
    <div class="pin-dot" id="pd5"></div>
  </div>
  <div class="pin-grid" id="pin-grid">
    <div class="pin-key" onclick="pinKey('1')">1</div>
    <div class="pin-key" onclick="pinKey('2')">2</div>
    <div class="pin-key" onclick="pinKey('3')">3</div>
    <div class="pin-key" onclick="pinKey('4')">4</div>
    <div class="pin-key" onclick="pinKey('5')">5</div>
    <div class="pin-key" onclick="pinKey('6')">6</div>
    <div class="pin-key" onclick="pinKey('7')">7</div>
    <div class="pin-key" onclick="pinKey('8')">8</div>
    <div class="pin-key" onclick="pinKey('9')">9</div>
    <div class="pin-key empty"></div>
    <div class="pin-key" onclick="pinKey('0')">0</div>
    <div class="pin-key del" onclick="pinDel()">⌫</div>
  </div>
  <div class="pin-msg" id="pin-msg"></div>
  <button class="pin-change-btn" id="pin-change-btn" onclick="pinStartChange()" style="display:none">Change PIN</button>
</div>

<div id="sync-bar"></div>
<div id="app">
  <div id="topbar">
    <div class="tbl"><h1>Pers.Evol</h1><p id="day-lbl">Loading…</p></div>
    <div class="tbr">
      <span id="sync-dot"></span>
      <div class="opct"><span id="opct">0%</span><small>Overall</small></div>
      <button id="menu-btn" onclick="toggleDrawer()">☰</button>
      <button onclick="pinStartChange()" style="width:36px;height:36px;border-radius:9px;border:1px solid var(--b1);background:var(--s2);color:var(--t3);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center" title="Change PIN">🔒</button>
    </div>
  </div>
  <div id="groupnav"></div>
  <div id="subnav"></div>
  <div id="content"></div>
</div>

<div id="drawer">
  <div id="dbg" onclick="toggleDrawer()"></div>
  <div id="dpanel">
    <div class="dr-head"><span>Navigate</span><button id="dr-close" onclick="toggleDrawer()">✕</button></div>
    <div id="dr-content"></div>
    <div class="dr-footer">
      <div id="dr-days" style="font-size:26px;font-family:Georgia,serif;color:var(--gl);font-style:italic;line-height:1">—</div>
      <div style="font-size:10px;color:var(--t3);letter-spacing:2px;text-transform:uppercase;margin-top:4px">Days Remaining</div>
      <div style="height:5px;background:var(--s3);border-radius:3px;overflow:hidden;margin-top:10px">
        <div id="dr-prog" style="height:100%;background:linear-gradient(90deg,var(--gold),var(--gl));border-radius:3px;transition:width 1s ease;width:0%"></div>
      </div>
      <div style="font-size:10px;color:var(--t3);font-family:monospace;margin-top:5px">May 3 – Aug 30 2026</div>
    </div>
  </div>
</div>

<div id="toast"></div>
<button id="nx-btn" onclick="toggleNX()" title="Neurix AI">🧠</button>
<div id="nx-panel">

// ═══════════════ CALC ═══════════════
function calcTaskPct(){ ensureDaily(); const at=activeTasks(); return pct(at.filter(t=>gd('daily.tasks.'+t.id,false)).length,at.length); }
function calcMedPct(){  ensureDaily(); return pct(MEDS.filter(m=>gd('daily.meds.'+m.id,false)).length,MEDS.length); }
function calcDCPct(){   return pct(DC_ITEMS.filter(i=>gd('dc.'+i.id,false)).length,DC_ITEMS.length); }
function calcGoalPct(){ return pct(ALL_GOALS.filter(g=>gd('goals.'+g.id,false)).length,ALL_GOALS.length); }
function calcIntPct(){  return pct(STEPS.filter(s=>gd('int.steps.'+s.id+'.done',false)).length,STEPS.length); }
function calcExPct(){
  const logs=gd('ex.logs',[]);
  if(!logs.length) return 0;
  // This week's sessions (Mon–today)
  const wkStart=getMon(TODAY);
  const wkLogs=logs.filter(l=>new Date(l.date)>=wkStart&&new Date(l.date)<=TODAY);
  const wkPct=Math.min(100,Math.round(wkLogs.length/4*100));
  // Overall average: sessions per full week elapsed
  const weeksElapsed=Math.max(1,Math.ceil(DAY_NUM/7));
  const avgPerWk=logs.length/weeksElapsed;
  const avgPct=Math.min(100,Math.round(avgPerWk/4*100));
  // Blend: 60% this week, 40% rolling average
  return Math.round(wkPct*0.6+avgPct*0.4);
}
function calcSubPct(){
  const logs=gd('sub.logs',[]); if(!logs.length) return 0;
  const r7=logs.slice(0,7);
  const aR=r7.reduce((a,l)=>a+l.r,0)/r7.length;
  const aM=r7.reduce((a,l)=>a+l.m,0)/r7.length;
  return Math.round((Math.max(0,1-aR/5)*100+Math.max(0,1-aM/4)*100)/2);
}
function calcOverall(){
  return Math.round(calcTaskPct()*.2+calcGoalPct()*.2+calcSubPct()*.18+calcExPct()*.18+calcDCPct()*.12+calcIntPct()*.12);
}

function renderAll(){
  ensureDaily();
  document.getElementById('opct').textContent=calcOverall()+'%';
  document.getElementById('day-lbl').textContent=`Day ${DAY_NUM} · ${Math.max(0,TOTAL_DAYS-DAY_NUM+1)} to go`;

}

// ═══════════════ GLUCOSE ═══════════════
function bGlucose(){
  const logs=gd('glu.logs',[]);
  const f7=logs.filter(l=>l.type==='Fasting').slice(0,7);
  const avg=f7.length?(f7.reduce((a,l)=>a+l.val,0)/f7.length).toFixed(0):'—';
  const todayF=logs.find(l=>l.date===TODAY_S&&l.type==='Fasting');
  function gs(t,v){if(t==='Fasting'){if(v<70)return['Low','var(--blue)'];if(v<=100)return['Normal ✓','var(--green)'];if(v<=125)return['Pre-DM','var(--orange)'];return['High','var(--red)'];}if(t==='Post-Meal'){if(v<=140)return['Good ✓','var(--green)'];if(v<=180)return['Mod','var(--orange)'];return['High','var(--red)'];}return['Logged','var(--t3)'];}
  const mon=getMon(TODAY);
  const wk=Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);const ds=d.toISOString().split('T')[0];return {ds,isGDay:GLUCO_DAYS.includes(i),logged:logs.some(l=>l.date===ds&&l.type==='Fasting'),isToday:ds===TODAY_S,name:['Mon','Tue','Wed','Thu','Fri','Sat','Sun'][i]};});
  const fasts=logs.filter(l=>l.type==='Fasting').slice(0,14).reverse();
  return `
  <div class="info-bar" style="background:rgba(217,80,80,.05);border:1px solid rgba(217,80,80,.18);color:var(--t2)">
    <strong style="color:var(--red)">Schedule:</strong> Fasting every <strong>Mon · Tue · Fri · Sat</strong> (4×/week). Post-meal 2hr after lunch & dinner (weeks 1–8).
  </div>
  <div class="g3" style="margin-bottom:14px">
    <div class="tile"><div class="tl">7-Day Avg</div><div class="tv" style="color:${avg==='—'?'var(--t3)':parseInt(avg)<=100?'var(--green)':parseInt(avg)<=125?'var(--orange)':'var(--red)'}">${avg}</div><div class="ts">mg/dL fasting</div></div>
    <div class="tile"><div class="tl">Today Fasting</div><div class="tv" style="color:${todayF?gs('Fasting',todayF.val)[1]:'var(--t3)'}">${todayF?todayF.val:'—'}</div><div class="ts">${todayF?gs('Fasting',todayF.val)[0]:'not logged'}</div></div>
    <div class="tile"><div class="tl">Total Readings</div><div class="tv" style="color:var(--t2)">${logs.length}</div><div class="ts">logged</div></div>
  </div>
  <div class="card">
    <div class="ct">This Week</div>
    <div class="wgrid">
      ${wk.map(w=>`<div class="wday ${w.logged&&w.isGDay?'ex':''} ${w.isToday&&!w.logged?'td':''}" style="${!w.isGDay?'opacity:.35':''}">
        <div style="font-family:monospace;font-size:11px">${w.name}</div>
        <div style="font-size:9px;margin-top:2px">${w.isGDay?(w.logged?'✓':'○'):'–'}</div>
      </div>`).join('')}
    </div>
  </div>
  <div class="card">
    <div class="ct">Log a Reading</div>
    <div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px">
      ${['Fasting','Post-Meal','Pre-Workout','Bedtime'].map(t=>`<button onclick="setGluType(this,'${t}')" data-gt="${t}" style="padding:6px 12px;border-radius:7px;cursor:pointer;font-size:12px;border:1px solid var(--b1);background:var(--s2);color:var(--t2);transition:all .15s">${t}</button>`).join('')}

// ═══════════════ EXERCISE — APPLE WATCH RINGS ═══════════════
function bExercise(){
  const logs=gd('ex.logs',[]);

  const durPct=Math.min(100,Math.round(todayMin/45*100));
  let streak=0;const cd=new Date(TODAY);
  for(let i=0;i<90;i++){const ds=cd.toISOString().split('T')[0];if(logs.some(l=>l.date===ds)){streak++;cd.setDate(cd.getDate()-1);}else break;}
  const streakPct=Math.min(100,Math.round(streak/30*100));

  const rings=[
    {l:'Consistency',v:consistency,c:'#ff375f',r:80,d:`${logs.length} sessions / ${target} target`},
    {l:'Duration',   v:durPct,     c:'#74d680',r:62,d:`${todayMin} / 45 min today`},
    {l:'Streak',     v:streakPct,  c:'#4ecfff',r:44,d:`${streak} consecutive days`},
  ];

  const wkly=Array.from({length:4},(_,wi)=>{const wE2=new Date(TODAY);wE2.setDate(TODAY.getDate()-wi*7);const wS2=getMon(wE2);const c=logs.filter(l=>{const d=new Date(l.date);return d>=wS2&&d<=wE2;}).length;const m=logs.filter(l=>{const d=new Date(l.date);return d>=wS2&&d<=wE2;}).reduce((a,l)=>a+l.dur,0);return {l:wi===0?'This week':`${wi}w ago`,c,m};}).reverse();

  return `
  <div class="card" style="background:linear-gradient(135deg,#0a0a18,#0d0d20);border-color:rgba(255,255,255,.08)">

          ${rings.map(ring=>{const C=2*Math.PI*ring.r;const off=C*(1-ring.v/100);return `
          <circle cx="95" cy="95" r="${ring.r}" class="ring-track" stroke="${ring.c}"/>
          <circle cx="95" cy="95" r="${ring.r}" class="ring-glow" stroke="${ring.c}" style="stroke-dasharray:${C};stroke-dashoffset:${off}" transform="rotate(-90 95 95)"/>
          <circle cx="95" cy="95" r="${ring.r}" class="ring-fill" stroke="${ring.c}" style="stroke-dasharray:${C};stroke-dashoffset:${off}" transform="rotate(-90 95 95)"/>`}).join('')}
          <text x="95" y="87" text-anchor="middle" fill="rgba(255,255,255,.4)" font-size="9" letter-spacing="1" font-family="monospace">ACTIVITY</text>
          <text x="95" y="103" text-anchor="middle" fill="#fff" font-size="20" font-weight="700" font-family="monospace">${consistency}%</text>
          <text x="95" y="116" text-anchor="middle" fill="rgba(255,255,255,.3)" font-size="9" font-family="monospace">consistency</text>
        </svg>
      </div>

function renderExCal(){
  const logs=gd('ex.logs',[]);
  // Standard calendar
  const el=document.getElementById('ex-cal');
  if(el){
    const yr=TODAY.getFullYear(),mo=TODAY.getMonth();
    const dim=new Date(yr,mo+1,0).getDate();
    const sp=monIdx(new Date(yr,mo,1));
    let h='';
    for(let i=0;i<sp;i++) h+='<div></div>';
    for(let d=1;d<=dim;d++){
      const ds=yr+'-'+String(mo+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      const logged=logs.some(l=>l.date===ds);
      const isT=d===TODAY.getDate()&&mo===TODAY.getMonth();
      h+='<div class="wday '+(logged?'ex ':'')+( isT&&!logged?'td':'')+'"><div style="font-family:monospace;font-size:11px">'+d+'</div>'+(logged?'<div style="font-size:8px">✓</div>':'')+'</div>';
    }
    el.innerHTML=h;
  }
  // Ring calendar
  const rc=document.getElementById('ex-ring-cal');
  if(rc){
    const yr=TODAY.getFullYear(),mo=TODAY.getMonth();
    const dim=new Date(yr,mo+1,0).getDate();
    const sp=monIdx(new Date(yr,mo,1));
    let h='';
    for(let i=0;i<sp;i++) h+='<div></div>';
    for(let d=1;d<=dim;d++){
      const ds=yr+'-'+String(mo+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      const dayLogs=logs.filter(l=>l.date===ds);
      const hasEx=dayLogs.length>0;
      const durMin=dayLogs.reduce((a,l)=>a+l.dur,0);
      const durP=Math.min(100,Math.round(durMin/45*100));
      const isT=d===TODAY.getDate();
      const isFuture=new Date(ds)>TODAY;
      const C=2*Math.PI*9;
      h+='<div style="display:flex;flex-direction:column;align-items:center;gap:1px;padding:3px 1px;border-radius:5px;background:'+(isT?'rgba(201,150,90,.08)':'transparent')+'">'
        +'<svg width="22" height="22" viewBox="0 0 22 22">'
          +'<circle cx="11" cy="11" r="9" fill="none" stroke="rgba(255,61,95,.12)" stroke-width="3.5"/>'
          +(hasEx?'<circle cx="11" cy="11" r="9" fill="none" stroke="#ff375f" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="'+C+'" stroke-dashoffset="'+C*(1-durP/100)+'" transform="rotate(-90 11 11)"/>'  :'')
          +'<circle cx="11" cy="11" r="5" fill="none" stroke="rgba(116,214,128,.12)" stroke-width="2.5"/>'
          +(hasEx?'<circle cx="11" cy="11" r="5" fill="none" stroke="#74d680" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="'+(2*Math.PI*5)+'" stroke-dashoffset="'+(2*Math.PI*5*(1-durP/100))+'" transform="rotate(-90 11 11)"/>'  :'')
        +'</svg>'

      +'</div>';
    }
    rc.innerHTML=h;
  }
}

function bIntimacy(){
  const stps=gd('int.steps',{});
  const doneSt=STEPS.filter(s=>stps[s.id]&&stps[s.id].done);
  const curIdx=STEPS.findIndex(s=>!stps[s.id]||!stps[s.id].done);
  const cur=STEPS[curIdx];
  const phases={1:'Phase 1 · Communication',2:'Phase 2 · Building',3:'Phase 3 · Consummation',4:'Phase 4 · Independence',5:'Phase 5 · Wholeness'};
  return `
  <div class="info-bar" style="background:rgba(216,88,128,.05);border:1px solid rgba(216,88,128,.18);color:var(--t2)">
    <strong style="color:var(--pink)">Progressive intimacy tracker.</strong> Each step builds on the last. Rate each attempt. The pattern of progress is how you know the loop is breaking.
  </div>
  <div class="g3" style="margin-bottom:14px">
    <div class="tile"><div class="tl">Steps Done</div><div class="tv" style="color:var(--teal)">${doneSt.length}</div><div class="ts">of ${STEPS.length}</div></div>
    <div class="tile"><div class="tl">Current</div><div class="tv" style="color:var(--pink);font-size:15px">${curIdx+1}</div><div class="ts">${cur?cur.title.split(' ').slice(0,2).join(' ')+'…':'Complete!'}</div></div>
    <div class="tile"><div class="tl">Progress</div><div class="tv" style="color:var(--gold)">${calcIntPct()}%</div><div class="ts">overall</div></div>
  </div>
  ${[1,2,3,4,5].map(ph=>{
    const phSteps=STEPS.filter(s=>s.phase===ph);
    return `<div class="card">
      <div class="ct">${phases[ph]}</div>
      ${phSteps.map(s=>{
        const sd=stps[s.id]||{};
        const isDone=sd.done||false;
        const rating=sd.rating||0;
        const isCur=s.id===(cur?.id);
        return `<div class="step-card ${isDone?'done':isCur?'current':''}">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:${isDone?8:0}px">
            <div style="width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:monospace;flex-shrink:0;border:2px solid ${isDone?'var(--green)':isCur?'var(--teal)':'var(--b2)'};color:${isDone?'var(--green)':isCur?'var(--teal)':'var(--t3)'}">
              ${isDone?'✓':s.id.replace('s','')}

  </div>
  <div style="background:linear-gradient(160deg,rgba(201,150,90,.07),rgba(14,14,28,.8));border:1px solid rgba(201,150,90,.22);border-radius:16px;overflow:hidden;margin-bottom:16px">
    <div style="padding:20px 20px 16px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <span style="font-size:22px">${ch.icon}</span>
        <div>
          <div style="font-size:9px;color:rgba(201,150,90,.6);letter-spacing:3px;text-transform:uppercase">Daily Stoic Challenge</div>
          <div style="font-family:Georgia,serif;font-size:14px;color:var(--gl);font-style:italic">${ch.title}</div>
        </div>
      </div>
      ${!revealed?`<button onclick="revealCh()" style="width:100%;padding:14px;border-radius:10px;border:1px dashed rgba(201,150,90,.25);background:rgba(201,150,90,.03);cursor:pointer;text-align:center;color:rgba(201,150,90,.6);font-size:13px;font-family:Georgia,serif;font-style:italic">🏛 Tap to reveal today's contemplation</button>`:`<div>
        <div style="font-family:Georgia,serif;font-size:15px;color:var(--t1);line-height:1.85;padding:14px;background:rgba(255,255,255,.02);border-radius:10px;border:1px solid rgba(201,150,90,.15);margin-bottom:10px">"${ch.q}"</div>
        <div style="font-size:11px;color:var(--t3);font-style:italic;line-height:1.6;margin-bottom:10px">${ch.note}</div>
        <textarea class="jta" placeholder="Your reflection…" rows="3" style="min-height:70px" onblur="saveCh(this.value)">${gd('journal.ch.'+TODAY_S,'')}</textarea>
      </div>`}
    </div>
  </div>
  ${isSaved?`<div style="padding:9px 14px;background:rgba(74,170,120,.06);border:1px solid rgba(74,170,120,.18);border-radius:8px;margin-bottom:14px;font-size:12px;color:var(--green)">✦ Entry saved — ${filled}/${J_PROMPTS.length} reflections</div>`:''}
  ${J_PROMPTS.map(p=>{const val=entry[p.id]||'';const has=val.length>10;return `
  <div class="jp ${has?'filled':''}">
    <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:10px">
      <span style="font-size:18px;flex-shrink:0;margin-top:1px">${p.icon}</span>
      <div style="flex:1"><h4>${p.title}</h4><p>${p.prompt}</p></div>
      ${has?'<span style="color:rgba(201,150,90,.45);font-size:12px;margin-top:2px">✦</span>':''}
    </div>
    <div style="height:1px;background:linear-gradient(to right,rgba(201,150,90,.18),transparent);margin-bottom:10px"></div>
    <textarea class="jta" placeholder="Write freely. No judgment here." rows="3" onblur="${_isViewingPast?'':('saveJp(\''+p.id+'\',this.value)')}" ${_isViewingPast?'readonly style="opacity:.7;cursor:default"':''} >${val}</textarea>
  </div>`}).join('')}
  ${_isViewingPast?'':`<button onclick="saveJournalEntry()" style="width:100%;padding:13px;margin:10px 0 24px;border-radius:12px;border:1px solid rgba(201,150,90,.35);background:rgba(201,150,90,.08);color:var(--gl);font-size:14px;cursor:pointer;font-family:Georgia,serif;font-style:italic;letter-spacing:.5px">
    ${isSaved?'✦ Saved — tap to update':"Save today's entry →"}
  </button>`}
  <div class="qblock"><div class="qt">${q.q}</div><div class="qa">— ${q.a}</div><div class="qf">DAY ${DAY_NUM} OF ${TOTAL_DAYS} · THE WORK CONTINUES</div></div>

  <div class="card" style="margin-top:4px;border-color:rgba(201,150,90,.2)">
    <div class="ct" style="cursor:pointer;user-select:none" onclick="togglePastEntries()">
      <span style="font-family:Georgia,serif;font-size:13px;color:var(--gl);font-style:italic">Past Entries</span>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:10px;color:var(--t3);font-family:monospace">${Object.keys(S.journal||{}).filter(k=>k.match(/^\d{4}-\d{2}-\d{2}$/)).length} entries</span>
        <span id="past-entries-chev" style="font-size:14px;color:var(--t3);transition:transform .2s;transform:rotate(${gd('ui.pastEntriesOpen',false)?90:0}deg)">›</span>
      </div>
    </div>
    ${gd('ui.pastEntriesOpen',true)?`
    <div id="past-entries-body">
      ${(()=>{
        // Collect all journal dates from state
        const dates=Object.keys(S.journal||{})
          .filter(k=>k.match(/^\d{4}-\d{2}-\d{2}$/))
          .sort((a,b)=>b.localeCompare(a)); // newest first

        if(!dates.length) return '<div style="font-size:12px;color:var(--t3);padding:8px 0;text-align:center">No past entries yet.</div>';

        const selDate=gd('ui.journalViewDate', dates[0]);

        return '<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px">'
          +dates.map(d=>{
            const isSelected=d===selDate;
            const entryObj=S['journal.'+d]||{};
            const filled=J_PROMPTS.filter(p=>entryObj[p.id]&&entryObj[p.id].length>10).length;
            return '<div onclick="viewJournalDate(\''+d+'\')" style="padding:5px 10px;border-radius:7px;border:1px solid '+(isSelected?'rgba(201,150,90,.5)':'var(--b1)')+';background:'+(isSelected?'rgba(201,150,90,.1)':'var(--s2)')+';cursor:pointer;font-family:monospace;font-size:10px;color:'+(isSelected?'var(--gl)':'var(--t3)')+'">'+d.slice(5)+'<span style="display:block;font-size:8px;opacity:.7">'+filled+'/7</span></div>';
          }).join('')
          +'</div>'
          +(()=>{
            const entryObj=(S.journal||{})[selDate]||{};
            const chText=((S.journal||{})['ch']||{})[selDate]||'';
            const chRevealed=((S.journal||{})['chalRevealed']||{})[selDate]||false;
            const ch=STOIC_CH[parseInt(selDate.split('-')[2])%STOIC_CH.length];

            let out='<div style="padding:8px 12px;background:rgba(201,150,90,.06);border:1px solid rgba(201,150,90,.2);border-radius:8px;margin-bottom:12px">'
              +'<div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(201,150,90,.6);margin-bottom:3px">'+selDate+'</div>'
              +'<div style="font-family:Georgia,serif;font-size:12px;color:var(--gl);font-style:italic">'+J_PROMPTS.filter(p=>entryObj[p.id]&&entryObj[p.id].length>10).length+' of 7 prompts written</div>'
            +'</div>';

            // Stoic challenge
            if(chRevealed||chText){
              out+='<div style="margin-bottom:14px;padding:12px;background:linear-gradient(160deg,rgba(201,150,90,.07),rgba(14,14,28,.8));border:1px solid rgba(201,150,90,.18);border-radius:10px">'
                +'<div style="font-size:9px;color:rgba(201,150,90,.5);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px">'+ch.icon+' Stoic Challenge · '+ch.title+'</div>'
                +'<div style="font-family:Georgia,serif;font-size:13px;color:var(--t2);font-style:italic;line-height:1.7;margin-bottom:'+(chText?'10px':'0')+'">\"'+ch.q+'\"</div>'
                +(chText?'<div style="font-size:12px;color:var(--t1);line-height:1.7;border-top:1px solid rgba(201,150,90,.15);padding-top:8px">'+chText.replace(/\n/g,'<br>')+'</div>':'')
              +'</div>';
            }

            // Journal prompts
            out+=J_PROMPTS.map(p=>{
              const val=entryObj[p.id]||'';
              if(!val||val.length<5) return '';
              return '<div style="margin-bottom:14px;padding:12px 14px;background:var(--s2);border:1px solid rgba(201,150,90,.12);border-radius:10px;border-left:3px solid rgba(201,150,90,.35)">'
                +'<div style="display:flex;align-items:center;gap:7px;margin-bottom:8px">'
                  +'<span style="font-size:14px">'+p.icon+'</span>'
                  +'<div><div style="font-family:Georgia,serif;font-size:12px;color:var(--gl);font-style:italic">'+p.title+'</div>'
                  +'<div style="font-size:10px;color:var(--t3);margin-top:1px">'+p.prompt+'</div></div>'
                +'</div>'
                +'<div style="font-size:13px;color:var(--t1);line-height:1.85;font-family:Georgia,serif;white-space:pre-wrap">'+val+'</div>'
              +'</div>';
            }).join('');

            const hasAny=J_PROMPTS.some(p=>entryObj[p.id]&&entryObj[p.id].length>5);
            if(!hasAny&&!chText) out+='<div style="font-size:12px;color:var(--t3);text-align:center;padding:16px">Nothing written on this date.</div>';

            return out;
          })();
      })()}
    </div>`:''}
  </div>`;
}


// ═══════════════ WHITE PAPERS — KANBAN ═══════════════
function bPapers(){
  const wpSt=gd('wp',{});
  const expandedSec=gd('ui.wpSec','');
  return `
  <div class="info-bar" style="background:var(--s2);border:1px solid var(--b1);color:var(--t2)">
    <strong style="color:var(--gl)">Schedule:</strong> 1 paper per 4 weeks · 8 sections · Complete by Jul 30. <strong style="color:var(--gl)">Tap any section to see what goes inside it.</strong>
  </div>
  ${(()=>{
    if(DAY_NUM<1||DAY_NUM>28) return '';
    const todayTask=WP1_DAILY[DAY_NUM]||null;
    if(!todayTask) return '';
    const taskDone=gd('wp1.daily.'+DAY_NUM,false);
    const wkLabel=DAY_NUM<=7?'Research Week':DAY_NUM<=14?'Writing: Detection':DAY_NUM<=19?'Writing: CTEM':DAY_NUM<=26?'Analysis & Submit':'Review';
    return `<div class="card" style="border-color:rgba(74,126,224,.35);background:rgba(74,126,224,.04);margin-bottom:14px">
      <div class="ct" style="color:var(--blue)">WP1 Daily Task · Day ${DAY_NUM} · ${wkLabel}</div>
      <div style="display:flex;align-items:flex-start;gap:12px">
        <div onclick="toggleWP1Daily(${DAY_NUM})" style="width:22px;height:22px;border-radius:6px;border:2px solid ${taskDone?'var(--blue)':'var(--b2)'};background:${taskDone?'var(--blue)':'transparent'};display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;flex-shrink:0;cursor:pointer;margin-top:2px;transition:all .2s">${taskDone?'✓':''}</div>
        <div style="flex:1">
          <div style="font-size:13px;color:${taskDone?'var(--t3)':'var(--t1)'};line-height:1.6${taskDone?';text-decoration:line-through':''}">${todayTask}</div>
          <div style="font-size:10px;color:var(--t3);margin-top:5px;font-family:monospace">Week ${Math.ceil(DAY_NUM/7)} of 4 · ${28-DAY_NUM} days remaining in WP1</div>
        </div>
      </div>
      ${DAY_NUM>1&&WP1_DAILY[DAY_NUM-1]?`<div style="margin-top:10px;padding:8px 10px;background:rgba(255,255,255,.03);border-radius:7px;font-size:11px;color:var(--t3)"><strong>Yesterday:</strong> ${WP1_DAILY[DAY_NUM-1]}</div>`:''}
    </div>`;
  })()}

  ${WHITEPAPERS.map(wp=>{
    const plan=WP_DAILY_PLAN[wp.id];
    if(!plan||!plan.days.length) return '';
    const isAct=DAY_NUM-1>=wp.wStart&&DAY_NUM-1<=wp.wEnd;
    if(!isAct) return '';
    // Day within this paper (relative to paper start)
    const paperDay=DAY_NUM-wp.wStart;
    const todayTask=plan.days.find(d=>d.day===paperDay);
    const completedDays=plan.days.filter(d=>gd('wp.daily.'+wp.id+'.d'+d.day,false)).length;
    const phaseColors={Research:'var(--blue)',Writing:'var(--gold)',Review:'var(--orange)',Done:'var(--green)'};
    return '<div class="card" style="border-color:'+wp.c+';border-left:3px solid '+wp.c+';margin-bottom:12px">'
      +'<div class="ct">Daily Activity Plan · '+plan.title+'</div>'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'
        +'<div style="font-size:12px;color:var(--t2)">Paper Day '+paperDay+' of 28 · '+completedDays+'/28 days done</div>'
        +'<div style="font-family:monospace;font-size:12px;font-weight:700;color:'+wp.c+'">'+Math.round(completedDays/28*100)+'%</div>'
      +'</div>'
      +(todayTask?'<div style="padding:12px;background:rgba(201,150,90,.08);border:1px solid rgba(201,150,90,.25);border-radius:8px;margin-bottom:12px">'
        +'<div style="font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gl);margin-bottom:5px">TODAY — Day '+todayTask.day+' · '+todayTask.phase+'</div>'
        +'<div style="font-size:13px;color:var(--t1);line-height:1.6">'+todayTask.task+'</div>'
        +'<button onclick="markWPDay(\''+wp.id+'\','+todayTask.day+')" style="margin-top:8px;padding:6px 14px;background:'+phaseColors[todayTask.phase]+'22;border:1px solid '+phaseColors[todayTask.phase]+'44;border-radius:6px;color:'+phaseColors[todayTask.phase]+';font-size:11px;cursor:pointer;font-family:var(--mn)">'+(gd('wp.daily.'+wp.id+'.d'+todayTask.day,false)?'✓ Done — mark undone':'Mark today done')+'</button>'
      +'</div>':'')
      +'<div style="overflow-x:auto">'
        +'<div style="display:flex;gap:3px;min-width:420px;margin-bottom:8px">'
          +plan.days.map(d=>{
            const done=gd('wp.daily.'+wp.id+'.d'+d.day,false);
            const isCur=d.day===paperDay;
            const pc=phaseColors[d.phase];
            return '<div onclick="toggleWPDayDetail(\''+wp.id+'_d'+d.day+'\')" title="Day '+d.day+': '+d.task.slice(0,40)+'…" style="width:20px;height:20px;border-radius:3px;flex-shrink:0;background:'+(done?pc:isCur?pc+'33':'var(--s3)')+';border:1px solid '+(isCur?pc:done?pc+'88':'var(--b1)')+';cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:8px;font-family:monospace;color:'+(done?'#000':isCur?pc:'var(--t3)')+'">'+d.day+'</div>';
          }).join('')
        +'</div>'
        +'<div style="display:flex;gap:12px;font-size:10px;color:var(--t3)">'
          +Object.entries({Research:'var(--blue)',Writing:'var(--gold)',Review:'var(--orange)',Done:'var(--green)'}).map(([p,c])=>'<div style="display:flex;align-items:center;gap:4px"><div style="width:8px;height:8px;border-radius:2px;background:'+c+'"></div>'+p+'</div>').join('')
        +'</div>'
      +'</div>'
      // Day detail panel
      +(gd('ui.wpDayDetail','')&&gd('ui.wpDayDetail','').startsWith(wp.id)?
        (()=>{
          const key=gd('ui.wpDayDetail','');
          const dayNum=parseInt(key.split('_d')[1]);
          const dayData=plan.days.find(d=>d.day===dayNum);
          if(!dayData) return '';
          const done=gd('wp.daily.'+wp.id+'.d'+dayNum,false);
          return '<div style="margin-top:12px;padding:10px 12px;background:var(--s3);border-radius:8px;border:1px solid var(--b1)">'
            +'<div style="font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:'+phaseColors[dayData.phase]+';margin-bottom:5px">Day '+dayNum+' · '+dayData.phase+'</div>'
            +'<div style="font-size:12px;color:var(--t2);line-height:1.6;margin-bottom:8px">'+dayData.task+'</div>'
            +'<button onclick="markWPDay(\''+wp.id+'\','+dayNum+')" style="padding:5px 12px;background:'+(done?'var(--gr)':'var(--ag2)')+';border:1px solid '+(done?'rgba(74,170,120,.3)':'rgba(201,150,90,.3)')+';border-radius:5px;color:'+(done?'var(--green)':'var(--gold)')+';font-size:11px;cursor:pointer">'+(done?'✓ Done — undo':'Mark done')+'</button>'
          +'</div>';
        })()
      :'')
    +'</div>';
  }).join('')}

    ${WHITEPAPERS.map(wp=>{
    const st=wpSt[wp.id]||{};
    const done=WP_SECS.filter((_,i)=>st['s'+i]).length;
    const wpPct=pct(done,WP_SECS.length);
    const isAct=DAY_NUM-1>=wp.wStart&&DAY_NUM-1<=wp.wEnd;
    const isPast=DAY_NUM-1>wp.wEnd;
    const stages=['Research','Writing','Review','Done'];
    const stageColor={'Research':'var(--blue)','Writing':'var(--gold)','Review':'var(--orange)','Done':'var(--green)'};
    const secsByStage=[WP_SECS.slice(0,2),WP_SECS.slice(2,5),WP_SECS.slice(5,7),WP_SECS.slice(7,8)];
    return `
    <div class="card" style="border-color:${isAct?wp.c:isPast?'var(--green)':'var(--b1)'}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div>
          <div style="font-size:15px;font-weight:600;color:${isAct?wp.c:isPast?'var(--green)':'var(--t1)'};margin-bottom:2px">${wp.title}</div>
          <div style="font-size:11px;color:var(--t3);line-height:1.4;margin-bottom:4px">${wp.sub}</div>
          <div style="font-size:10px;font-family:monospace;color:${isAct?wp.c:'var(--t3)'}">Weeks ${wp.weeks} ${isAct?'← ACTIVE':isPast?'✓ Period passed':''}</div>
        </div>
        <div style="text-align:right;flex-shrink:0;margin-left:12px">
          <div style="font-family:monospace;font-size:22px;font-weight:700;color:${wp.c}">${wpPct}%</div>
          <div style="font-size:10px;color:var(--t3)">${done}/${WP_SECS.length}</div>
        </div>
      </div>
      <div class="pbar" style="margin-bottom:14px"><div class="pbar-f" style="width:${wpPct}%;background:${wp.c}"></div></div>
      <div style="overflow-x:auto">
        <div class="kb">
          ${stages.map((stage,si)=>`
          <div class="kbc">
            <div class="kbch"><div style="width:8px;height:8px;border-radius:50%;background:${stageColor[stage]}"></div><span style="color:${stageColor[stage]}">${stage}</span></div>
            ${secsByStage[si].map((sec,idx)=>{
              const secIdx=WP_SECS.indexOf(sec);
              const isDone=st['s'+secIdx]||false;
              const expKey=wp.id+'_s'+secIdx;
              const isExp=expandedSec===expKey;
              const detail=WP_SECTION_DETAIL[sec]||'';
              return `
            <div style="background:${isDone?wp.c+'12':'var(--s3)'};border:1px solid ${isDone?wp.c:'var(--b1)'};border-radius:8px;margin-bottom:8px;overflow:hidden;cursor:pointer" onclick="toggleWPSecExpand('${expKey}')">
              <div style="display:flex;align-items:center;gap:7px;padding:10px 12px">
                <div onclick="event.stopPropagation();toggleWPSec('${wp.id}','s${secIdx}')" style="width:16px;height:16px;border-radius:4px;border:1.5px solid ${isDone?wp.c:'var(--b2)'};background:${isDone?wp.c:'transparent'};display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;flex-shrink:0;transition:all .15s">${isDone?'✓':''}</div>
                <h5 style="font-size:12px;font-weight:500;color:${isDone?wp.c:'var(--t1)'};flex:1;margin:0">${sec}</h5>
                <div style="font-size:9px;color:var(--t3);transition:transform .2s;transform:rotate(${isExp?90:0}deg);flex-shrink:0">›</div>
              </div>
              ${isExp?`<div style="padding:0 12px 12px;border-top:1px solid rgba(255,255,255,.06)">
                <div style="font-size:9px;letter-spacing:1px;text-transform:uppercase;color:${wp.c};margin:8px 0 5px">Section ${secIdx+1} of 8 — What goes here</div>
                <div style="font-size:11px;color:var(--t2);line-height:1.7">${detail}</div>
              </div>`:''}
            </div>`;}).join('')}
          </div>`).join('')}
        </div>
      </div>
    </div>`;
  }).join('')}`;
}

// ═══════════════ PRODUCTS — SPRINT KANBAN ═══════════════
function bProducts(){
  const pSt=gd('prod',{});

      <div class="pbar" style="margin-bottom:12px"><div class="pbar-f" style="width:${ppct}%;background:${prod.c}"></div></div>
      <div style="overflow-x:auto">
        <div class="kb">
          ${SPRINT_ST.map(stage=>`
          <div class="kbc">
            <div class="kbch"><div style="width:8px;height:8px;border-radius:50%;background:${stCols[stage]}"></div><span style="color:${stCols[stage]}">${stage}</span></div>

              const expKey=prod.id+'_s'+i;

              const tasks=((SPRINT_DETAILS||{})[prod.id]||{})[i]||[];
              return `
            <div style="background:var(--s3);border:1px solid ${stage==='Done'?prod.c:stage==='In Progress'?'rgba(201,150,90,.3)':'var(--b1)'};border-radius:8px;margin-bottom:8px;overflow:hidden">

                  <h5 style="font-size:12px;font-weight:500;color:var(--t1);margin:0 0 2px">${sp}</h5>
                  <p style="font-size:10px;color:var(--t3);margin:0">Sprint ${i+1}${tasks.length?' · '+tasks.length+' tasks':''}</p>
                </div>
                <div style="font-size:9px;color:var(--t3);transition:transform .2s;transform:rotate(${isExp?90:0}deg)">›</div>

async function sendNX(){
  const inp=document.getElementById('nx-inp');
  const msg=inp.value.trim();
  if(!msg) return;
  inp.value='';
  const msgs=document.getElementById('nx-msgs');
  msgs.innerHTML+='<div class="nxm user">'+msg+'</div>';
  ensureDaily();
  const tasksDone=TASKS.filter(t=>gd('daily.tasks.'+t.id,false)).length;
  const lmsg=msg.toLowerCase();
  let fb='';
  if(lmsg.includes('today')||lmsg.includes('focus')){
    const pending=TASKS.filter(t=>!gd('daily.tasks.'+t.id,false));
    fb='Day '+DAY_NUM+'. '+tasksDone+'/'+TASKS.length+' tasks done.'+(pending.length?' Still pending: '+pending.map(t=>t.label.split(' ').slice(1).join(' ')).join(', ')+'.':' All tasks complete.');

    fb=gd('ex.logs',[]).length+' sessions logged. Consistency: '+calcExPct()+'%.';
  } else if(lmsg.includes('goal')){
    fb=ALL_GOALS.filter(g=>gd('goals.'+g.id,false)).length+'/'+ALL_GOALS.length+' goals achieved. '+calcGoalPct()+'% complete.';
  } else if(lmsg.includes('glucose')||lmsg.includes('blood')){
    const last=gd('glu.logs',[])[0];

  setTimeout(()=>{msgs.innerHTML+='<div class="nxm ai">'+fb+'</div>';msgs.scrollTop=msgs.scrollHeight;},400);

}

// ═══════════════════════════════════════════════════════
// PIN LOCK SYSTEM
// ═══════════════════════════════════════════════════════
let _pinBuffer  = '';
let _pinMode    = 'unlock'; // 'unlock' | 'set' | 'confirm' | 'change_old' | 'change_new' | 'change_confirm'
let _pinConfBuf = '';
let _pinUnlocked = false;

// SHA-256 hash using Web Crypto API
async function sha256(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function pinGetStored(){ return localStorage.getItem('pev2_pin'); }
function pinSetStored(hash){ localStorage.setItem('pev2_pin', hash); }

function pinUpdateDots(buf, state){
  for(let i=0;i<6;i++){
    const dot = document.getElementById('pd'+i);
    dot.className = 'pin-dot';
    if(state==='error') dot.classList.add('error');
    else if(i < buf.length) dot.classList.add('filled');
  }
}

function pinMsg(msg, type){
  const el = document.getElementById('pin-msg');
  el.textContent = msg;
  el.className = 'pin-msg' + (type?' '+type:'');
}

function pinKey(k){
  if(_pinBuffer.length >= 6) return;
  _pinBuffer += k;
  pinUpdateDots(_pinBuffer);
  if(_pinBuffer.length === 6) setTimeout(pinSubmit, 80);
}

function pinDel(){
  if(_pinBuffer.length > 0){
    _pinBuffer = _pinBuffer.slice(0,-1);
    pinUpdateDots(_pinBuffer);
  }
}

async function pinSubmit(){
  const hash = await sha256(_pinBuffer);
  const stored = pinGetStored();

  if(_pinMode === 'unlock'){
    if(!stored){
      // No PIN set yet — switch to set mode
      _pinMode = 'set';
      _pinBuffer = '';
      document.getElementById('pin-title').textContent = 'Set a 6-digit PIN';
      pinMsg('Choose a PIN you\'ll remember');
      pinUpdateDots('');
      return;
    }
    if(hash === stored){
      pinUnlockSuccess();
    } else {
      pinWrongPIN();
    }

  } else if(_pinMode === 'set'){
    _pinConfBuf = _pinBuffer;
    _pinBuffer = '';
    _pinMode = 'confirm';
    document.getElementById('pin-title').textContent = 'Confirm PIN';
    pinMsg('Enter the same PIN again');
    pinUpdateDots('');

  } else if(_pinMode === 'confirm'){
    if(_pinBuffer === _pinConfBuf){
      pinSetStored(hash);
      _pinMode = 'unlock';
      _pinBuffer = '';
      _pinConfBuf = '';
      document.getElementById('pin-title').textContent = 'Enter PIN';
      pinMsg('PIN set! Enter it to continue', 'success');
      pinUpdateDots('');
    } else {
      _pinBuffer = '';
      _pinMode = 'set';
      _pinConfBuf = '';
      document.getElementById('pin-title').textContent = 'Set a 6-digit PIN';
      pinUpdateDots('', 'error');
      pinMsg('PINs did not match — try again', 'error');
      setTimeout(()=>pinUpdateDots(''), 400);
    }

  } else if(_pinMode === 'change_old'){
    if(hash === stored){
      _pinBuffer = '';
      _pinMode = 'change_new';
      document.getElementById('pin-title').textContent = 'New PIN';
      pinMsg('Enter your new 6-digit PIN');
      pinUpdateDots('');
    } else {
      pinWrongPIN();
    }

  } else if(_pinMode === 'change_new'){
    _pinConfBuf = _pinBuffer;
    _pinBuffer = '';
    _pinMode = 'change_confirm';
    document.getElementById('pin-title').textContent = 'Confirm New PIN';
    pinMsg('Enter new PIN again');
    pinUpdateDots('');

  } else if(_pinMode === 'change_confirm'){
    if(_pinBuffer === _pinConfBuf){
      pinSetStored(hash);
      _pinBuffer = '';
      _pinConfBuf = '';
      _pinMode = 'unlock';
      document.getElementById('pin-title').textContent = 'Enter PIN';
      pinMsg('PIN changed ✓', 'success');
      pinUpdateDots('');
      setTimeout(()=>pinMsg(''), 2000);
      document.getElementById('pin-screen').classList.add('unlocked');
    } else {
      _pinBuffer = '';
      _pinMode = 'change_new';
      _pinConfBuf = '';
      pinUpdateDots('', 'error');
      pinMsg('PINs did not match — try again', 'error');
      setTimeout(()=>pinUpdateDots(''), 400);
    }
  }
}

function pinWrongPIN(){
  pinUpdateDots('●●●●●●', 'error');
  pinMsg('Incorrect PIN', 'error');
  _pinBuffer = '';
  setTimeout(()=>{
    pinUpdateDots('');
    pinMsg('');
  }, 700);
}

function pinUnlockSuccess(){
  _pinUnlocked = true;
  pinMsg('', 'success');
  const screen = document.getElementById('pin-screen');
  screen.classList.add('pin-unlocking');
  document.getElementById('pin-change-btn').style.display = 'block';
  setTimeout(()=>{
    screen.classList.add('unlocked');
    screen.classList.remove('pin-unlocking');
  }, 250);
}

function pinStartChange(){
  const screen = document.getElementById('pin-screen');
  screen.classList.remove('unlocked');
  _pinMode = 'change_old';
  _pinBuffer = '';
  document.getElementById('pin-title').textContent = 'Enter Current PIN';
  pinMsg('Confirm your current PIN first');
  pinUpdateDots('');
  document.getElementById('pin-change-btn').style.display = 'none';
}

// Keyboard support
document.addEventListener('keydown', function(e){
  if(document.getElementById('pin-screen').classList.contains('unlocked')) return;
  if(e.key >= '0' && e.key <= '9') pinKey(e.key);
  if(e.key === 'Backspace') pinDel();
});

// Boot: initialise PIN screen — called from DOMContentLoaded
function initPIN(){
  const stored = pinGetStored();
  if(!stored){
    _pinMode = 'set';
    document.getElementById('pin-title').textContent = 'Set a 6-digit PIN';
    pinMsg('First time? Choose a PIN to protect your data');
  } else {
    _pinMode = 'unlock';
    document.getElementById('pin-title').textContent = 'Enter PIN';
    document.getElementById('pin-change-btn').style.display = 'none';
  }
}

</script>
</body>
</html>
