<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pers.Evol">
<title>Pers.Evol — v2</title>
<style>
:root{
  --bg:#07070f;--s1:#0f0f1a;--s2:#161624;--s3:#1e1e2e;--s4:#252538;
  --b1:#28283e;--b2:#333350;
  --t1:#eeeef8;--t2:#8080a8;--t3:#484868;
  --gold:#c9965a;--gl:#e8b068;
  --red:#d95050;--green:#4aaa78;--blue:#4a7ee0;
  --purple:#8858d8;--orange:#d87844;--teal:#3aa898;--pink:#d85880;--cyan:#38b2c8;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,sans-serif;overscroll-behavior:none}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:var(--b1);border-radius:2px}
input,textarea,select,button{font-family:inherit;-webkit-appearance:none}
textarea{resize:vertical}

/* layout */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
#topbar{background:var(--s1);border-bottom:1px solid var(--b1);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:30}
#groupnav{background:var(--s1);border-bottom:1px solid var(--b1);padding:6px 14px;display:flex;gap:6px;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch}
#subnav{background:var(--bg);border-bottom:1px solid rgba(255,255,255,0.04);padding:0 12px;display:flex;overflow-x:auto;flex-shrink:0}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.panel{display:none;padding:16px;max-width:760px;margin:0 auto;padding-bottom:100px}
.panel.active{display:block}
#groupnav::-webkit-scrollbar,#subnav::-webkit-scrollbar{display:none}

/* topbar */
.tbl h1{font-family:Georgia,serif;font-size:15px;color:var(--gl);font-style:italic;letter-spacing:.3px}
.tbl p{font-size:10px;color:var(--t3);font-family:monospace;margin-top:1px}
.tbr{display:flex;align-items:center;gap:10px}
.opct span{font-family:monospace;font-size:20px;font-weight:700;color:var(--gold);display:block;line-height:1}
.opct small{font-size:8px;color:var(--t3);letter-spacing:2px;text-transform:uppercase}
#menu-btn{width:36px;height:36px;border-radius:9px;border:1px solid var(--b1);background:var(--s2);color:var(--t2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* nav */
.gpill{padding:5px 13px;border-radius:20px;border:1px solid var(--b1);background:transparent;color:var(--t3);font-size:12px;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px;transition:all .18s;flex-shrink:0}
.stab{padding:9px 13px;cursor:pointer;white-space:nowrap;flex-shrink:0;border-bottom:2px solid transparent;color:var(--t3);font-size:12.5px;display:flex;align-items:center;gap:5px;transition:all .15s;user-select:none}

/* drawer */
#drawer{position:fixed;inset:0;z-index:100;display:none}
#drawer.open{display:block}
#dbg{position:absolute;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px)}
#dpanel{position:absolute;top:0;right:0;bottom:0;width:280px;background:var(--s1);border-left:1px solid var(--b1);overflow-y:auto}
.dr-head{padding:18px 18px 12px;border-bottom:1px solid var(--b1);display:flex;justify-content:space-between;align-items:center}
.dr-head span{font-family:Georgia,serif;font-size:14px;color:var(--gl);font-style:italic}
#dr-close{background:none;border:none;color:var(--t3);font-size:18px;cursor:pointer}
.dr-sec{padding:10px 0}
.dr-lbl{padding:4px 18px 6px;font-size:10px;color:var(--t3);letter-spacing:2.5px;text-transform:uppercase;font-weight:600}
.dr-item{display:flex;align-items:center;gap:11px;padding:10px 18px;cursor:pointer;border-left:3px solid transparent;transition:all .15s}
.dr-item.on{background:rgba(255,255,255,.04)}
.dr-item .di-icon{font-size:15px;width:20px;text-align:center}
.dr-item .din{flex:1}
.dr-item .din h4{font-size:13px;font-weight:500}
.dr-item .din p{font-size:10px;color:var(--t3);margin-top:1px}
.dr-item .dipct{font-size:11px;font-family:monospace;font-weight:600}
.dr-footer{margin:8px 14px 20px;padding:14px;background:var(--s2);border-radius:10px;border:1px solid var(--b1);text-align:center}

/* cards / layout */
.card{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:18px;margin-bottom:14px}
.ct{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.ct strong{font-family:monospace;color:var(--gl);font-size:12px;font-weight:700;letter-spacing:0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.tile{background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:14px}
.tile .tl{font-size:10px;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.tile .tv{font-family:monospace;font-size:22px;font-weight:700;line-height:1;margin-bottom:3px}
.tile .ts{font-size:11px;color:var(--t3)}
.pbar{height:5px;background:var(--s3);border-radius:3px;overflow:hidden;margin:6px 0}
.pbar-f{height:100%;border-radius:3px;transition:width .8s ease}
.chk{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--b2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;flex-shrink:0;transition:all .2s;user-select:none}
.chk.on{background:var(--green);border-color:var(--green)}
.btn{padding:9px 18px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.bg{background:var(--gold);color:#07070f}.bg:hover{background:var(--gl)}
.bgh{background:var(--s2);color:var(--t2);border:1px solid var(--b2)}
.inp{background:var(--s2);border:1px solid var(--b2);border-radius:8px;color:var(--t1);padding:9px 12px;font-size:13px;outline:none;transition:border-color .2s;width:100%}
.inp:focus{border-color:var(--gold)}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--s4);border:1px solid var(--b2);border-radius:10px;padding:11px 20px;font-size:13px;z-index:999;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.6);max-width:320px;text-align:center}
#toast.show{opacity:1}

/* sync */
#sync-bar{position:fixed;top:0;left:0;right:0;height:2px;z-index:200;pointer-events:none}
#sync-bar.active{background:linear-gradient(90deg,transparent,var(--gold),transparent);animation:sb 1.2s infinite}
@keyframes sb{0%,100%{opacity:.4}50%{opacity:1}}
#sync-dot{font-size:10px;font-family:monospace;color:var(--t3)}

/* neurix */
#nx-btn{position:fixed;bottom:24px;right:20px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#1a0a2e,#0d1a3a);border:2px solid rgba(136,88,216,.6);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:50;box-shadow:0 4px 20px rgba(88,58,168,.4);font-size:22px;transition:all .3s}
#nx-btn:hover{transform:scale(1.08)}
#nx-panel{position:fixed;bottom:86px;right:16px;width:320px;background:linear-gradient(160deg,#0d0d1e,#121228);border:1px solid rgba(136,88,216,.3);border-radius:16px;z-index:50;display:none;overflow:hidden;box-shadow:0 16px 48px rgba(0,0,0,.8)}
#nx-panel.open{display:block}
.nxh{padding:14px 16px;border-bottom:1px solid rgba(136,88,216,.2);display:flex;align-items:center;gap:10px}
.nxhi h4{font-size:13px;color:var(--purple);font-weight:600}
.nxhi p{font-size:10px;color:var(--t3)}
.nxcl{margin-left:auto;background:none;border:none;color:var(--t3);cursor:pointer;font-size:16px}
#nx-msgs{height:200px;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.nxm{font-size:12px;line-height:1.6;padding:8px 12px;border-radius:8px;max-width:85%}
.nxm.ai{background:rgba(136,88,216,.12);color:var(--t2);border:1px solid rgba(136,88,216,.15);align-self:flex-start}
.nxm.user{background:rgba(201,150,90,.1);color:var(--t2);border:1px solid rgba(201,150,90,.2);align-self:flex-end}
.nxir{display:flex;gap:8px;padding:10px 12px;border-top:1px solid rgba(136,88,216,.15)}
#nx-inp{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(136,88,216,.2);border-radius:8px;color:var(--t1);padding:8px 10px;font-size:12px;outline:none}
#nx-send{background:var(--purple);color:#fff;border:none;border-radius:8px;padding:8px 12px;cursor:pointer;font-size:12px}

/* rings */
.ring-track{fill:none;stroke-width:16;opacity:.15}
.ring-fill{fill:none;stroke-width:16;stroke-linecap:round;transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)}
.ring-glow{fill:none;stroke-width:22;stroke-linecap:round;opacity:.15;transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)}

/* kanban */
.kb{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;overflow-x:auto;min-width:600px}
.kbc{background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:12px;min-height:180px}
.kbch{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.kbcard{background:var(--s3);border:1px solid var(--b1);border-radius:8px;padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:all .2s}
.kbcard:hover{border-color:var(--b2);transform:translateY(-1px)}
.kbcard h5{font-size:12px;font-weight:500;color:var(--t1);line-height:1.4;margin-bottom:4px}
.kbcard p{font-size:10px;color:var(--t3);line-height:1.4}

/* intimacy steps */
.step-card{background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:14px;margin-bottom:10px;transition:all .2s}
.step-card.current{border-color:var(--teal);background:rgba(58,168,152,.06)}
.step-card.done{border-color:var(--green);background:rgba(74,170,120,.05)}
.star{font-size:18px;cursor:pointer;transition:transform .15s;color:var(--t3)}
.star.lit{color:#f5c518}

/* journal */
.jp{margin-bottom:16px;background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:16px;transition:all .25s}
.jp.filled{border-color:rgba(201,150,90,.25)}
.jp h4{font-family:Georgia,serif;font-size:14px;font-style:italic;color:var(--t1);margin-bottom:3px}
.jp p{font-size:11px;color:var(--t3);line-height:1.6}
.jta{width:100%;background:rgba(255,255,255,.02);border:1px solid var(--b1);border-radius:8px;color:var(--t1);padding:11px 13px;font-size:13px;font-family:Georgia,serif;line-height:1.85;min-height:80px;outline:none;transition:border-color .2s}
.jta:focus{border-color:rgba(201,150,90,.45);box-shadow:0 0 0 3px rgba(201,150,90,.06)}
.qblock{background:linear-gradient(160deg,rgba(201,150,90,.07),rgba(7,7,15,.6));border:1px solid rgba(201,150,90,.16);border-radius:16px;padding:28px 22px;text-align:center;position:relative;overflow:hidden;margin-top:20px}
.qblock::before{content:'"';position:absolute;top:-10px;left:16px;font-family:Georgia,serif;font-size:80px;color:rgba(201,150,90,.1);line-height:1;pointer-events:none}
.qt{font-family:Georgia,serif;font-size:15px;color:var(--t2);line-height:1.9;font-style:italic;margin-bottom:14px}
.qa{display:inline-block;font-size:10px;color:var(--gold);letter-spacing:2.5px;text-transform:uppercase;padding:3px 14px;border:1px solid rgba(201,150,90,.22);border-radius:20px;background:rgba(201,150,90,.06)}
.qf{font-size:9px;color:var(--t3);font-family:monospace;letter-spacing:1.5px;margin-top:14px}

/* goals */
.gcats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.gcat{padding:5px 12px;border-radius:20px;border:1px solid var(--b1);background:transparent;color:var(--t3);font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap}
.ms-row{display:flex;gap:12px;align-items:center;padding:11px 0;border-bottom:1px solid var(--b1);cursor:pointer}
.ms-row:last-child{border:none}
.ms-chk{width:22px;height:22px;border-radius:50%;border:2px solid var(--b2);display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;flex-shrink:0;transition:all .2s}
.ms-row.achieved .ms-chk{background:var(--green);border-color:var(--green);color:#fff}

/* sprints */
.sprint{background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.sprint-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.sprint-hd h4{font-size:12px;font-weight:500;color:var(--t1)}

/* phase items */
.pi{display:flex;align-items:flex-start;gap:11px;padding:9px 0;border-bottom:1px solid var(--b1);cursor:pointer}
.pi:last-child{border:none}
.pi span{font-size:13px;color:var(--t2);line-height:1.5}
.pi.done span{text-decoration:line-through;color:var(--t3)}

/* water drops */
.drops{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.drop{width:30px;height:30px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .15s;border:1px solid var(--b1);background:var(--s2)}
.drop.on{background:rgba(74,126,224,.15);border-color:var(--blue)}

/* mindmap */
#mm-svg{width:100%;height:480px;background:radial-gradient(ellipse at center,#0d0d22 0%,var(--bg) 70%)}
.mm-node{cursor:pointer}
.mm-node circle{transition:all .3s}

@keyframes ringPulse{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .35s ease both}

/* week grid */
.wgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:8px}
.wday{aspect-ratio:1;border-radius:6px;background:var(--s2);border:1px solid var(--b1);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;color:var(--t3)}
.wday.ex{background:rgba(74,170,120,.12);border-color:var(--green);color:var(--green)}
.wday.td{border-color:var(--gold);color:var(--gold)}

.sl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin-bottom:10px;display:flex;justify-content:space-between}
.sl strong{font-family:monospace;color:var(--gl);letter-spacing:0;font-size:12px}
.info-bar{padding:10px 14px;border-radius:8px;margin-bottom:14px;font-size:12px;line-height:1.7}

@media(max-width:480px){.kb{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:1fr 1fr}}

/* ── PIN LOCK SCREEN ── */
#pin-screen{position:fixed;inset:0;z-index:9999;background:#07070f;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
#pin-screen.unlocked{display:none}
.pin-logo{font-family:Georgia,serif;font-size:28px;color:#e8b068;font-style:italic;margin-bottom:6px;letter-spacing:.3px}
.pin-sub{font-size:10px;color:#484868;font-family:monospace;letter-spacing:3px;text-transform:uppercase;margin-bottom:40px}
.pin-title{font-size:13px;color:#8080a8;font-family:monospace;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:20px;text-align:center}
.pin-dots{display:flex;gap:14px;margin-bottom:32px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid #333350;background:transparent;transition:all .15s}
.pin-dot.filled{background:#c9965a;border-color:#c9965a;box-shadow:0 0 8px rgba(201,150,90,.5)}
.pin-dot.error{background:#d95050;border-color:#d95050;animation:pinShake .3s ease}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:240px;width:100%}
.pin-key{height:60px;border-radius:12px;border:1px solid #28283e;background:#0f0f1a;color:#eeeef8;font-size:20px;font-family:monospace;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;user-select:none;-webkit-tap-highlight-color:transparent}
.pin-key:active{background:#1e1e2e;border-color:#c9965a;transform:scale(.95)}
.pin-key.del{font-size:16px;color:#8080a8}
.pin-key.empty{border:none;background:transparent;cursor:default}
.pin-msg{font-size:11px;color:#8080a8;font-family:monospace;margin-top:16px;text-align:center;min-height:16px}
.pin-msg.error{color:#d95050}
.pin-msg.success{color:#4aaa78}
.pin-change-btn{margin-top:20px;background:none;border:1px solid #28283e;color:#484868;font-size:10px;font-family:monospace;padding:6px 14px;border-radius:6px;cursor:pointer;letter-spacing:1px}
.pin-change-btn:hover{color:#8080a8;border-color:#333350}
@keyframes pinShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes pinUnlock{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(.97)}}
.pin-unlocking{animation:pinUnlock .25s ease forwards}
</style>
</head>
<body>

<!-- PIN LOCK SCREEN -->
<div id="pin-screen">
  <div class="pin-logo">Pers.Evol</div>
  <div class="pin-sub">Personal Evolution · v2</div>
  <div class="pin-title" id="pin-title">Enter PIN</div>
  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot" id="pd0"></div>
    <div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div>
    <div class="pin-dot" id="pd3"></div>
    <div class="pin-dot" id="pd4"></div>
    <div class="pin-dot" id="pd5"></div>
  </div>
  <div class="pin-grid" id="pin-grid">
    <div class="pin-key" onclick="pinKey('1')">1</div>
    <div class="pin-key" onclick="pinKey('2')">2</div>
    <div class="pin-key" onclick="pinKey('3')">3</div>
    <div class="pin-key" onclick="pinKey('4')">4</div>
    <div class="pin-key" onclick="pinKey('5')">5</div>
    <div class="pin-key" onclick="pinKey('6')">6</div>
    <div class="pin-key" onclick="pinKey('7')">7</div>
    <div class="pin-key" onclick="pinKey('8')">8</div>
    <div class="pin-key" onclick="pinKey('9')">9</div>
    <div class="pin-key empty"></div>
    <div class="pin-key" onclick="pinKey('0')">0</div>
    <div class="pin-key del" onclick="pinDel()">⌫</div>
  </div>
  <div class="pin-msg" id="pin-msg"></div>
  <button class="pin-change-btn" id="pin-change-btn" onclick="pinStartChange()" style="display:none">Change PIN</button>
</div>

<div id="sync-bar"></div>
<div id="app">
  <div id="topbar">
    <div class="tbl"><h1>Pers.Evol</h1><p id="day-lbl">Loading…</p></div>
    <div class="tbr">
      <span id="sync-dot"></span>
      <div class="opct"><span id="opct">0%</span><small>Overall</small></div>
      <button id="menu-btn" onclick="toggleDrawer()">☰</button>
      <button onclick="pinStartChange()" style="width:36px;height:36px;border-radius:9px;border:1px solid var(--b1);background:var(--s2);color:var(--t3);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center" title="Change PIN">🔒</button>
    </div>
  </div>
  <div id="groupnav"></div>
  <div id="subnav"></div>
  <div id="content"></div>
</div>

<div id="drawer">
  <div id="dbg" onclick="toggleDrawer()"></div>
  <div id="dpanel">
    <div class="dr-head"><span>Navigate</span><button id="dr-close" onclick="toggleDrawer()">✕</button></div>
    <div id="dr-content"></div>
    <div class="dr-footer">
      <div id="dr-days" style="font-size:26px;font-family:Georgia,serif;color:var(--gl);font-style:italic;line-height:1">—</div>
      <div style="font-size:10px;color:var(--t3);letter-spacing:2px;text-transform:uppercase;margin-top:4px">Days Remaining</div>
      <div style="height:5px;background:var(--s3);border-radius:3px;overflow:hidden;margin-top:10px">
        <div id="dr-prog" style="height:100%;background:linear-gradient(90deg,var(--gold),var(--gl));border-radius:3px;transition:width 1s ease;width:0%"></div>
      </div>
      <div style="font-size:10px;color:var(--t3);font-family:monospace;margin-top:5px">May 9 – Sep 5 2026</div>
    </div>
  </div>
</div>

<div id="toast"></div>
<button id="nx-btn" onclick="toggleNX()" title="Neurix AI">🧠</button>
<div id="nx-panel">

// ═══════════════ CALC ═══════════════
function calcTaskPct(){ ensureDaily(); const at=activeTasks(); return pct(at.filter(t=>gd('daily.tasks.'+t.id,false)).length,at.length); }
function calcMedPct(){  ensureDaily(); return pct(MEDS.filter(m=>gd('daily.meds.'+m.id,false)).length,MEDS.length); }
function calcDCPct(){   return pct(DC_ITEMS.filter(i=>gd('dc.'+i.id,false)).length,DC_ITEMS.length); }
function calcGoalPct(){ return pct(ALL_GOALS.filter(g=>gd('goals.'+g.id,false)).length,ALL_GOALS.length); }
function calcIntPct(){  return pct(STEPS.filter(s=>gd('int.steps.'+s.id+'.done',false)).length,STEPS.length); }
function calcExPct(){
  const logs=gd('ex.logs',[]);
  if(!logs.length) return 0;
  // This week&#39;s sessions (Mon–today)
  const wkStart=getMon(TODAY);
  const wkLogs=logs.filter(l=>new Date(l.date)>=wkStart&&new Date(l.date)<=TODAY);
  const wkPct=Math.min(100,Math.round(wkLogs.length/4*100));
  // Overall average: sessions per full week elapsed
  const weeksElapsed=Math.max(1,Math.ceil(DAY_NUM/7));
  const avgPerWk=logs.length/weeksElapsed;
  const avgPct=Math.min(100,Math.round(avgPerWk/4*100));
  // Blend: 60% this week, 40% rolling average
  return Math.round(wkPct*0.6+avgPct*0.4);
}
function calcSubPct(){
  const logs=gd('sub.logs',[]); if(!logs.length) return 0;
  const r7=logs.slice(0,7);
  const aR=r7.reduce((a,l)=>a+l.r,0)/r7.length;
  const aM=r7.reduce((a,l)=>a+l.m,0)/r7.length;
  return Math.round((Math.max(0,1-aR/5)*100+Math.max(0,1-aM/4)*100)/2);
}

// ═══════════════ TRAJECTORY ENGINE ═══════════════
function getWeeklyRate(logKey, dateField='date'){
  const logs = gd(logKey, []);
  if(!logs.length) return 0;
  const wkStart = getMon(TODAY);
  const thisWk = logs.filter(l => new Date(l[dateField]||l.date) >= wkStart).length;
  return thisWk;
}

function get7DayRate(habits){
  // habits: array of {key, total} where total is max per day
  let rates = {};
  habits.forEach(h => {
    const logs = gd(h.logKey, []);
    const last7 = Array.from({length:7}, (_,i) => {
      const d = new Date(TODAY); d.setDate(TODAY.getDate()-i);
      return d.toISOString().split('T')[0];
    });
    rates[h.id] = last7.filter(ds => {
      if(h.logKey === 'daily') return gd('daily.tasks.'+h.taskId, false);
      return logs.some(l => l.date === ds);
    }).length / 7;

}

function calcMissStreak(logKey, dateField='date'){

    const ds = d.toISOString().split('T')[0];
    if(!logs.some(l => (l[dateField]||l.date) === ds)) miss++;
    else break;
  }
  return miss;
}

function projectMetric(baseVal, target45, daysElapsed, up){
  if(!daysElapsed) return baseVal;
  const logs45 = gd('med.t45', {});
  const hasActual = Object.keys(logs45).length > 0;
  // Use trajectory from daily habits completion
  const exRate = calcExPct() / 100;
  const slpLogs = gd('slp.logs', []);
  const avgSlp = slpLogs.length ? slpLogs.slice(0,7).reduce((a,l)=>a+l.hrs,0)/Math.min(7,slpLogs.length) : 6;
  const slpRate = Math.min(1, avgSlp / 7);
  const subRate = calcSubPct() / 100;
  const habitScore = (exRate * 0.4 + slpRate * 0.35 + subRate * 0.25);
  const range = Math.abs(target45 - baseVal);
  const projected = up ? baseVal + range * habitScore : baseVal - range * habitScore;
  return Math.round(projected * 10) / 10;
}

// ═══════════════ TRAJECTORY ENGINE ═══════════════
function buildTrajectory(){
  const logs=gd('ex.logs',[]);
  const gluLogs=gd('glu.logs',[]);
  const slpLogs=gd('slp.logs',[]);
  const subLogs=gd('sub.logs',[]);

  // Sleep: 7-day average
  const slp7=slpLogs.slice(0,7);
  const avgSlp=slp7.length?(slp7.reduce((a,l)=>a+l.hrs,0)/slp7.length):0;
  const slpTrend=slpLogs.length>7?(avgSlp-(slpLogs.slice(7,14).reduce((a,l)=>a+l.hrs,0)/Math.max(1,slpLogs.slice(7,14).length))):0;

  // Exercise: sessions/week rate
  const wkStart=getMon(TODAY);
  const wkLogs=logs.filter(l=>new Date(l.date)>=wkStart);
  const exRate=wkLogs.length; // this week
  const ex30=logs.filter(l=>{const d=new Date(l.date);return (TODAY-d)/86400000<=30;}).length;
  const exWeekRate=ex30/4.3; // sessions per week over last 30 days

  // Substance: 7-day average
  const sub7=subLogs.slice(0,7);
  const avgR=sub7.length?(sub7.reduce((a,l)=>a+(l.r||0),0)/sub7.length):getTaper().r;
  const avgM=sub7.length?(sub7.reduce((a,l)=>a+(l.m||0),0)/sub7.length):getTaper().m;

  // Glucose: fasting trend
  const fasting=gluLogs.filter(l=>l.type==='Fasting').slice(0,7);
  const avgGlu=fasting.length?(fasting.reduce((a,l)=>a+l.val,0)/fasting.length):null;

  // Testosterone trajectory model
  // Base: 131. Inputs: sleep (40%), exercise (35%), substance (25%)
  const slpScore=Math.min(1,avgSlp/7); // 0-1
  const exScore=Math.min(1,exWeekRate/4); // 0-1
  const subScore=Math.min(1,(getTaper().r===0?1:(1-avgR/5)*0.5+(getTaper().m===0?1:(1-avgM/4))*0.5));
  const recoveryScore=slpScore*0.4+exScore*0.35+subScore*0.25;

  // T trajectory: 131 baseline, 500 theoretical max
  const tRange=500-131;
  const daysElapsed=DAY_NUM-1;
  const projT45=Math.round(131+tRange*recoveryScore*Math.min(1,45/120));
  const projT2m=Math.round(131+tRange*recoveryScore*Math.min(1,60/120));
  const projT4m=Math.round(131+tRange*recoveryScore);

  // Miss analysis: last 7 days per habit
  const taskMissRate=7-[0,1,2,3,4,5,6].filter(d=>{
    const ds=new Date(TODAY); ds.setDate(TODAY.getDate()-d);
    const dss=ds.toISOString().split('T')[0];
    return gd('daily.tasks.t4',false)&&(S.dailyHistory||{})[dss]?.tasks?.t4;
  }).length;

  return {
    avgSlp, slpTrend, exRate, exWeekRate, avgR, avgM, avgGlu,
    slpScore, exScore, subScore, recoveryScore,
    projT45, projT2m, projT4m,
    onTrack:{
      sleep:avgSlp>=6.5,
      exercise:exWeekRate>=3.5,
      substance:avgR<=getTaper().r&&avgM<=getTaper().m,
      glucose:avgGlu?avgGlu<=110:true,
    }
  };
}

// Miss analysis per habit key
function getMissAnalysis(habitKey, days=14){
  const history=S.dailyHistory||{};
  let misses=0,total=0;
  const reasons=[];
  for(let d=0;d<days;d++){
    const dt=new Date(TODAY); dt.setDate(TODAY.getDate()-d);
    const ds=dt.toISOString().split('T')[0];
    const dayData=history[ds];
    if(dayData){
      total++;
      const done=(dayData.tasks||{})[habitKey]||false;
      if(!done){
        misses++;
        if(dayData.missReason) reasons.push(dayData.missReason);
      }
    }
  }
  return {misses,total,rate:total?Math.round(misses/total*100):0,topReason:reasons[0]||null};
}

// ── Updated renderExCal to support tap-to-select day ────────────────
function renderExCal() {
  const logs = gd('ex.logs', []);
  const now = new Date();
  const yr = now.getFullYear();
  const mo = now.getMonth();
  const firstDay = new Date(yr, mo, 1);
  const lastDay = new Date(yr, mo + 1, 0);
  const offset = (firstDay.getDay() + 6) % 7;
  const totalCells = offset + lastDay.getDate();
  const cells = Math.ceil(totalCells / 7) * 7;
  const histDay = gd('ui.exHistDay', '');
 
  const cal = document.getElementById('ex-cal');
  if (!cal) return;
  let html = '';
  for (let i = 0; i < cells; i++) {
    if (i < offset) { html += `<div></div>`; continue; }
    const day = i - offset + 1;
    if (day > lastDay.getDate()) { html += `<div></div>`; continue; }
    const ds = `${yr}-${String(mo + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
    const dayLogs = logs.filter(l => l.date === ds);
    const dur = dayLogs.reduce((a, l) => a + l.dur, 0);
    const isToday = ds === TODAY_S;
    const isSelected = ds === histDay;
    const bg = isSelected ? 'rgba(74,170,120,.2)' : dur > 0 ? `rgba(74,126,224,${0.1 + Math.min(0.3, dur / 200)})` : 'rgba(255,255,255,.03)';
    const border = isSelected ? 'var(--green)' : isToday ? 'var(--blue)' : dur > 0 ? 'rgba(74,126,224,.4)' : 'rgba(255,255,255,.06)';
    html += `<div onclick="sd('ui.exHistDay','${isSelected ? '' : ds}');renderExCal()" style="aspect-ratio:1;border-radius:5px;background:${bg};border:1px solid ${border};display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative">
      <div style="font-size:9px;font-family:monospace;color:${isSelected ? 'var(--green)' : dur > 0 ? '#fff' : 'rgba(255,255,255,.2)'}">${day}</div>
      ${dur > 0 ? `<div style="font-size:7px;font-family:monospace;color:${isSelected ? 'var(--green)' : 'rgba(74,126,224,.8)'}">${dur}m</div>` : ''}
    </div>`;
  }
  cal.innerHTML = html;

function bWeekly(){
  const today=new Date();
  const isSunday=today.getDay()===0;
  const thisWeekKey=getMon(TODAY).toISOString().split('T')[0];
  const lastWeekStart=new Date(getMon(TODAY)); lastWeekStart.setDate(lastWeekStart.getDate()-7);
  const lastWeekKey=lastWeekStart.toISOString().split('T')[0];

  // Browse past reviews
  const viewKey=gd('ui.weeklyView',thisWeekKey);
  const review=gd('weekly.'+viewKey,{});
  const isThisWeek=viewKey===thisWeekKey;

  // Get all past review keys
  const allWeekKeys=Object.keys(S.weekly||{}).filter(k=>k.match(/^\d{4}-\d{2}-\d{2}$/)&&S.weekly[k].saved).sort((a,b)=>b.localeCompare(a));

  // Compute last week stats
  const exLogs=gd('ex.logs',[]);
  const slpLogs=gd('slp.logs',[]);
  const gluLogs=gd('glu.logs',[]);
  const subLogs=gd('sub.logs',[]);

  function weekStats(startDate){
    const end=new Date(startDate); end.setDate(end.getDate()+6);
    const exSessions=exLogs.filter(l=>{const d=new Date(l.date);return d>=startDate&&d<=end;});
    const slpNights=slpLogs.filter(l=>{const d=new Date(l.date);return d>=startDate&&d<=end;});
    const avgSlp=slpNights.length?(slpNights.reduce((a,l)=>a+l.hrs,0)/slpNights.length):null;
    const gluReadings=gluLogs.filter(l=>l.type==='Fasting'&&new Date(l.date)>=startDate&&new Date(l.date)<=end);
    const avgGlu=gluReadings.length?(gluReadings.reduce((a,l)=>a+l.val,0)/gluReadings.length):null;
    const subDays=subLogs.filter(l=>{const d=new Date(l.date);return d>=startDate&&d<=end;});
    const avgR=subDays.length?(subDays.reduce((a,l)=>a+(l.r||0),0)/subDays.length):null;
    const avgM=subDays.length?(subDays.reduce((a,l)=>a+(l.m||0),0)/subDays.length):null;
    const hist=S.dailyHistory||{};
    let taskDays=0,taskTotal=0;
    for(let d=new Date(startDate);d<=end;d.setDate(d.getDate()+1)){
      const ds=d.toISOString().split('T')[0];
      if(hist[ds]){taskTotal++;if(Object.values(hist[ds].tasks||{}).filter(Boolean).length>=5)taskDays++;}
    }
    return {exSessions:exSessions.length,avgSlp,avgGlu,avgR,avgM,taskDays,taskTotal};
  }

  const thisWeekStats=weekStats(getMon(TODAY));
  const lastWeekStats=weekStats(lastWeekStart);

  function delta(curr,prev,higher_is_better=true){
    if(curr===null||prev===null) return '';
    const d=curr-prev;
    const up=d>0;
    const good=higher_is_better?up:!up;
    return `<span style="font-size:10px;color:${good?'var(--green)':'var(--red)'}">${up?'↑':'↓'}${Math.abs(d).toFixed(1)}</span>`;

      ${allWeekKeys.slice(0,6).map(k=>`<div onclick="sd('ui.weeklyView','${k}');switchTab('weekly')" style="padding:5px 10px;border-radius:7px;border:1px solid ${viewKey===k?'var(--teal)':'var(--b1)'};background:${viewKey===k?'rgba(58,168,152,.1)':'transparent'};cursor:pointer;font-family:monospace;font-size:10px;color:${viewKey===k?'var(--teal)':'var(--t3)'}">${k.slice(5)}</div>`).join('')}

            {l:'Sleep avg',curr:thisWeekStats.avgSlp,prev:lastWeekStats.avgSlp,hib:true,fmt:v=>v?v.toFixed(1)+'h':'—'},
            {l:'Fasting glucose',curr:thisWeekStats.avgGlu,prev:lastWeekStats.avgGlu,hib:false,fmt:v=>v?Math.round(v)+' mg/dL':'—'},
            {l:'Rollies/day avg',curr:thisWeekStats.avgR,prev:lastWeekStats.avgR,hib:false,fmt:v=>v?v.toFixed(1):'—'},
            {l:'MJ/day avg',curr:thisWeekStats.avgM,prev:lastWeekStats.avgM,hib:false,fmt:v=>v?v.toFixed(1):'—'},
            {l:'Full task days',curr:thisWeekStats.taskDays,prev:lastWeekStats.taskDays,hib:true,fmt:v=>v+'/'+thisWeekStats.taskTotal},

            <td style="padding:8px 10px;border-bottom:1px solid var(--b1);color:var(--t2)">${r.l}</td>

async function _posLoad(panelId){
  const $ = id => document.getElementById(id);
  const today = new Date().toISOString().split('T')[0];

  if(!POS_KEY){
    $(`pos-status-${panelId}`).textContent = '⚠ Add POS_KEY to enable live sync';
    $(`pos-date-${panelId}`).textContent = 'Key not set';
    return;
  }

  const hdr = {'apikey':POS_KEY,'Authorization':'Bearer '+POS_KEY};
  const safeArr = v => Array.isArray(v) ? v : [];

  // Helper: fetch + safe JSON parse, never throws
  const safeFetch = async (url) => {
    try {
      const r = await fetch(url, {headers:hdr});
      const j = await r.json();
      return j;
    } catch(e) { return null; }
  };

  const HABIT_KEYS   = ['sa_upskill','rixtrace','white_paper','cnis','pers_evol','exercise','wife_time','journaling'];
  const HABIT_LABELS = ['SA Upskill','RixTrace','White Paper','CNIS','Pers-Evol','Exercise','Wife Time','Journaling'];

  try {
    // ── Phase 1: today's tracker + evening (parallel) ──
    const [trackersRaw, eveningsRaw] = await Promise.all([
      safeFetch(`${POS_URL}/rest/v1/daily_trackers?date=eq.${today}&select=*`),
      safeFetch(`${POS_URL}/rest/v1/evening_logs?date=eq.${today}&select=*`),
    ]);

    const tracker = safeArr(trackersRaw)[0] || null;
    const evening = safeArr(eveningsRaw)[0] || null;

    // ── Today score ──
    let done = 0;
    if(tracker) HABIT_KEYS.forEach(k => { if(tracker[k]) done++; });
    const pct = tracker ? Math.round(done/8*100) : null;

    const pctEl = $(`pos-pct-${panelId}`);
    if(pctEl){
      pctEl.textContent = pct !== null ? pct+'%' : '—%';
      pctEl.style.color = pct === null ? 'var(--teal)' : pct>=75 ? 'var(--teal)' : pct>=50 ? 'var(--gold)' : 'var(--orange)';
    }
    const dateEl = $(`pos-date-${panelId}`);
    if(dateEl) dateEl.textContent = tracker
      ? `${done}/8 habits · ${new Date(today+'T00:00:00').toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'})}`
      : 'No entry yet for today';

    // ── Habit pills ──
    const habitsEl = $(`pos-habits-${panelId}`);
    if(habitsEl){
      habitsEl.innerHTML = HABIT_LABELS.map((label,i)=>{
        const isDone = !!(tracker && tracker[HABIT_KEYS[i]]);
        return `<div style="padding:5px 10px;border-radius:20px;background:${isDone?'rgba(58,168,152,.15)':'rgba(255,255,255,.04)'};border:1px solid ${isDone?'rgba(58,168,152,.5)':'rgba(255,255,255,.08)'};font-size:10px;color:${isDone?'var(--teal)':'var(--t3)'}">${isDone?'✓ ':''}${label}</div>`;
      }).join('');
    }

    // ── Evening score ──
    const EVE_KEYS = ['exercise_done','meditation_done','wife_time_done','deep_work_done','wind_down_done'];
    let eveDone = 0;
    if(evening) EVE_KEYS.forEach(k=>{ if(evening[k]) eveDone++; });
    const evePct = evening ? Math.round(eveDone/5*100) : null;
    const eveEl = $(`pos-eve-${panelId}`);
    if(eveEl){
      eveEl.textContent = evePct !== null ? evePct+'%' : '—%';
      if(evePct !== null) eveEl.style.color = evePct>=80?'var(--teal)':evePct>=50?'var(--gold)':'var(--purple)';
    }

    // ── Phase 2: last 7 days of daily_trackers for streak + week score ──
    const streak7Raw = await safeFetch(
      `${POS_URL}/rest/v1/daily_trackers?select=date,sa_upskill,rixtrace,white_paper,cnis,pers_evol,exercise,wife_time,journaling&order=date.desc&limit=7`
    );
    const streak7 = safeArr(streak7Raw);

    // Week score = how many of last 7 days had ≥4 habits done
    const activeDays = streak7.filter(r => HABIT_KEYS.filter(k=>r[k]).length >= 4).length;
    const weekPct = Math.round(activeDays/7*100);
    const weekEl = $(`pos-week-${panelId}`);
    if(weekEl){
      weekEl.textContent = weekPct+'%';
      weekEl.style.color = weekPct>=70?'var(--blue)':'var(--t2)';
    }

    // ── Streak dots ──
    // sorted oldest → newest for left-to-right display
    const sorted7 = [...streak7].sort((a,b)=>a.date>b.date?1:-1);

    // Fill missing days so we always show 7 slots
    const slots = Array.from({length:7},(_,i)=>{
      const d = new Date(today); d.setDate(d.getDate()-(6-i));
      const ds = d.toISOString().split('T')[0];
      const row = sorted7.find(r=>r.date===ds);
      return {date:ds, row};
    });

    let consec = 0;
    for(let i=slots.length-1;i>=0;i--){
      const r = slots[i].row;
      if(r && HABIT_KEYS.filter(k=>r[k]).length>=4) consec++;
      else break;
    }
    const streakEl = $(`pos-streak-${panelId}`);
    if(streakEl) streakEl.textContent = consec + (consec===1?' day':' days');

    slots.forEach((slot,i)=>{
      const dotEl = $(`pos-dot-${panelId}-${i}`);
      if(!dotEl) return;
      const cnt = slot.row ? HABIT_KEYS.filter(k=>slot.row[k]).length : 0;
      const pct2 = Math.round(cnt/8*100);
      const isToday = slot.date===today;
      const c = cnt===0 ? 'rgba(255,255,255,.15)' : pct2>=75?'var(--teal)':pct2>=50?'var(--gold)':pct2>=25?'var(--orange)':'var(--red)';
      dotEl.style.background = cnt===0 ? 'rgba(255,255,255,.03)' : c+'22';
      dotEl.style.borderColor = isToday ? 'rgba(58,168,152,.6)' : c;
      dotEl.style.position = 'relative';
      const dayLabel = new Date(slot.date+'T00:00:00').toLocaleDateString('en-IN',{weekday:'short'}).slice(0,2);
      dotEl.innerHTML = cnt>0
        ? `<div style="position:absolute;top:50%;left:0;right:0;transform:translateY(-60%);text-align:center;font-size:9px;color:${c};font-family:monospace;font-weight:600">${pct2}%</div><div style="position:absolute;bottom:2px;left:0;right:0;text-align:center;font-size:7px;color:${c}99;font-family:monospace">${dayLabel}</div>`
        : `<div style="position:absolute;bottom:2px;left:0;right:0;text-align:center;font-size:7px;color:rgba(255,255,255,.2);font-family:monospace">${dayLabel}</div>`;
    });

    const statusEl = $(`pos-status-${panelId}`);
    if(statusEl){
      statusEl.textContent = '● Live · ' + new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
      statusEl.style.color = 'rgba(58,168,152,.5)';
    }

  } catch(err){
    const s = $(`pos-status-${panelId}`);
    if(s){ s.textContent = '✗ Error: '+err.message; s.style.color='var(--red)'; }
  }
}

let NX_HISTORY = [];

function buildNXContext(){
  ensureDaily();
  const T = buildTrajectory();
  const tr = getTaper();
  const exLogs = gd('ex.logs', []);
  const slpLogs = gd('slp.logs', []);
  const gluLogs = gd('glu.logs', []).filter(l => l.type === 'Fasting');
  const subLogs = gd('sub.logs', []);
  const wkStart = getMon(TODAY);
  const wkExLogs = exLogs.filter(l => new Date(l.date) >= wkStart);
  const lastSlp = slpLogs[0];
  const lastGlu = gluLogs[0];
  const tasksDone = TASKS.filter(t => gd('daily.tasks.' + t.id, false)).length;
  const medsDone = MEDS.filter(m => gd('daily.meds.' + m.id, false)).length;
  const goalsAchieved = ALL_GOALS.filter(g => gd('goals.' + g.id, false)).length;
  const todaySubR = gd('daily.subR', 0);
  const todaySubM = gd('daily.subM', 0);
  const buildLogs = gd('prod.buildLogs', {});
  const todayBuild = buildLogs[TODAY_S];
  const wpDone = Object.keys(gd('wp1.daily', {})).filter(k => gd('wp1.daily.' + k, false)).length;
  const weekPriority = gd('weekly.thisPriority', '');
  const intSteps = STEPS.filter(s => gd('int.steps.' + s.id + '.done', false)).length;
  const curStep = STEPS.find(s => !gd('int.steps.' + s.id + '.done', false));
  const phase1Done = DC_ITEMS.filter(i => gd('dc.' + i.id, false)).length;

  // Miss analysis
  const exMiss7 = exLogs.filter(l => {
    const d = new Date(l.date);
    return (TODAY - d) / 86400000 <= 7;
  }).length;

  // Substance this week
  const subThisWk = subLogs.slice(0, 7);
  const avgRWk = subThisWk.length ? (subThisWk.reduce((a, l) => a + (l.r || 0), 0) / subThisWk.length).toFixed(1) : todaySubR;
  const totalMWk = subThisWk.reduce((a, l) => a + (l.m || 0), 0);

  return {
    day: DAY_NUM, totalDays: TOTAL_DAYS, overall: calcOverall(),
    tasks: { done: tasksDone, total: TASKS.length },
    meds: { done: medsDone, total: MEDS.length },
    sleep: {
      last: lastSlp ? lastSlp.hrs : null,
      lastDate: lastSlp ? lastSlp.date : null,
      avg7: T.avgSlp,
      onTrack: T.onTrack.sleep,
      quality: lastSlp ? lastSlp.q : null,
    },
    exercise: {
      totalSessions: exLogs.length,
      thisWeek: wkExLogs.length,
      last7days: exMiss7,
      consistency: calcExPct(),
      onTrack: T.onTrack.exercise,
      lastSession: exLogs[0] || null,
    },
    glucose: {
      last: lastGlu ? lastGlu.val : null,
      lastDate: lastGlu ? lastGlu.date : null,
      avg7: T.avgGlu,
      onTrack: T.onTrack.glucose,
    },
    substances: {
      todayNico: todaySubR, targetNico: tr.r,
      weekMJ: totalMWk, targetMJ: tr.m,
      week: tr.l, onTrack: T.onTrack.substance,
      avgNico7: avgRWk,
    },
    testosterone: {
      baseline: 131,
      proj45d: T.projT45, target45d: 200,
      proj2m: T.projT2m, target2m: 300,
      proj4m: T.projT4m, target4m: 500,
      checkpoint45d: '23 Jun 2026',
      recoveryScore: Math.round(T.recoveryScore * 100),
    },
    goals: { achieved: goalsAchieved, total: ALL_GOALS.length, pct: calcGoalPct() },
    intimacy: { stepsComplete: intSteps, total: STEPS.length, currentStep: curStep ? curStep.title : 'All complete' },
    phase1: { done: phase1Done, total: DC_ITEMS.length, pct: calcDCPct() },
    water: gd('daily.water', 0),
    weekPriority,
    rixtrace: {
      sprintsDone: PRODUCTS[0].sprints.filter((_, i) => gd('prod.p1.s' + i, '') === 'Done').length,
      total: 7,
      todayLog: todayBuild ? todayBuild.log : null,
      blocker: todayBuild ? todayBuild.blocker : null,
    },
    papers: { wp1DaysDone: wpDone, target: 28 },
    trajectory: T,
  };
}

function nxAnswer(msg, ctx) {
  const q = msg.toLowerCase();

  // ── GREETINGS ──
  if (q.match(/^(hi|hey|hello|sup|yo)\b/)) {
    const slpWarn = !ctx.sleep.onTrack && ctx.sleep.avg7 > 0 ? ` Sleep is at ${ctx.sleep.avg7.toFixed(1)}h avg — that&#39;s your biggest drag right now.` : '';
    return `Day ${ctx.day}. Overall ${ctx.overall}%.${slpWarn} ${ctx.tasks.done}/${ctx.tasks.total} tasks done today. What do you want to work on?`;
  }

  // ── HOW AM I DOING / OVERVIEW ──
  if (q.match(/how.*(am i|doing|going)|overall|summary|status/)) {
    const sleepStatus = ctx.sleep.avg7 > 0
      ? (ctx.sleep.onTrack ? `Sleep avg ${ctx.sleep.avg7.toFixed(1)}h ✓` : `Sleep avg ${ctx.sleep.avg7.toFixed(1)}h ⚠ under target`)
      : 'Sleep not logged yet';
    const exStatus = ctx.exercise.onTrack
      ? `Exercise ${ctx.exercise.thisWeek} sessions this week ✓`
      : `Exercise ${ctx.exercise.thisWeek}/4 this week — need ${4 - ctx.exercise.thisWeek} more`;
    const subStatus = ctx.substances.onTrack
      ? `Taper on target (${ctx.substances.week})`
      : `Taper over limit — ${ctx.substances.todayNico} nico vs ${ctx.substances.targetNico} target`;
    const tStatus = ctx.testosterone.proj45d >= 200
      ? `T projected ${ctx.testosterone.proj45d} ng/dL at 45d ✓`
      : `T projected ${ctx.testosterone.proj45d} ng/dL at 45d — gap of ${200 - ctx.testosterone.proj45d} to target`;
    return `Day ${ctx.day}/${ctx.totalDays} · Overall ${ctx.overall}%\n\n${sleepStatus}\n${exStatus}\n${subStatus}\n${tStatus}\n\nGoals: ${ctx.goals.achieved}/${ctx.goals.total} · Phase 1: ${ctx.phase1.pct}% · Intimacy: Step ${ctx.intimacy.stepsComplete + 1}`;
  }

  // ── SLEEP ──
  if (q.match(/sleep|rest|recovery/)) {
    if (!ctx.sleep.last) return `No sleep logged yet. Log it in Health → Sleep. Your 7h target is critical — 80% of testosterone is made during deep sleep.`;
    const hrs = ctx.sleep.last;
    const trend = ctx.sleep.avg7 > 0 ? ` 7-day avg: ${ctx.sleep.avg7.toFixed(1)}h.` : '';
    const verdict = hrs >= 7 ? `${hrs}h last night — on target. ✓` : hrs >= 6 ? `${hrs}h last night — close but short of the 7h minimum.` : `${hrs}h last night — this is directly suppressing your T recovery. Fix sleep first.`;
    return `${verdict}${trend} Sleep drives 40% of your testosterone recovery score. Every hour under 7h costs you roughly 8% on the T projection.`;
  }

  // ── EXERCISE ──
  if (q.match(/exercise|workout|gym|train|session/)) {
    const last = ctx.exercise.lastSession;
    const lastStr = last ? `Last session: ${last.type} · ${last.dur} min (${last.date}).` : 'No sessions logged yet.';
    const weekStr = ctx.exercise.thisWeek >= 4
      ? `${ctx.exercise.thisWeek} sessions this week — target hit. ✓`
      : `${ctx.exercise.thisWeek}/4 sessions this week. Need ${4 - ctx.exercise.thisWeek} more.`;
    return `${weekStr} ${lastStr} ${ctx.exercise.totalSessions} total sessions logged. Consistency ${ctx.exercise.consistency}%. Exercise drives 35% of T recovery.`;
  }

  // ── TESTOSTERONE / T ──
  if (q.match(/testost|hormone|t level|bloodwork|blood work/)) {
    const gap45 = 200 - ctx.testosterone.proj45d;
    const verdict45 = gap45 <= 0
      ? `On track for ${ctx.testosterone.checkpoint45d} target of 200 ng/dL.`
      : `Projected ${ctx.testosterone.proj45d} at ${ctx.testosterone.checkpoint45d} — ${gap45} short of 200 target.`;
    return `Baseline: ${ctx.testosterone.baseline} ng/dL (Mar 2026).\n${verdict45}\n2-month projection: ${ctx.testosterone.proj2m} (target 300)\n4-month projection: ${ctx.testosterone.proj4m} (target 500)\n\nRecovery score: ${ctx.testosterone.recoveryScore}% — Sleep ${Math.round(ctx.trajectory.slpScore * 100)}%, Exercise ${Math.round(ctx.trajectory.exScore * 100)}%, Taper ${Math.round(ctx.trajectory.subScore * 100)}%.\n\n${!ctx.sleep.onTrack ? 'Fix sleep first — it&#39;s your biggest lever.' : !ctx.exercise.onTrack ? 'Hit 4 exercise sessions this week to improve the projection.' : 'Inputs are on track.'}`;
  }

  // ── GLUCOSE ──
  if (q.match(/glucose|sugar|insulin|blood sugar/)) {
    if (!ctx.glucose.last) return `No fasting glucose logged yet. Schedule: Mon, Tue, Fri, Sat. Log in Health → Glucose. Target under 100 mg/dL.`;
    const verdict = ctx.glucose.last <= 100 ? 'Normal ✓' : ctx.glucose.last <= 125 ? 'Pre-diabetic range' : 'High';
    return `Last fasting glucose: ${ctx.glucose.last} mg/dL (${ctx.glucose.lastDate}) — ${verdict}. ${ctx.glucose.avg7 ? 'Average (recent): ' + Math.round(ctx.glucose.avg7) + ' mg/dL.' : ''} Target: under 100. Log on Mon, Tue, Fri, Sat.`;
  }

  // ── SUBSTANCES / TAPER ──
  if (q.match(/smok|nicot|rollie|nico|taper|mj|weed|cannabis|substance/)) {
    const nicoStatus = ctx.substances.todayNico <= ctx.substances.targetNico
      ? `Nicotine: ${ctx.substances.todayNico}/${ctx.substances.targetNico} today ✓`
      : `Nicotine: ${ctx.substances.todayNico}/${ctx.substances.targetNico} today — over limit ⚠`;
    const mjStatus = ctx.substances.weekMJ <= ctx.substances.targetMJ
      ? `MJ: ${ctx.substances.weekMJ}/${ctx.substances.targetMJ} this week ✓`
      : `MJ: ${ctx.substances.weekMJ}/${ctx.substances.targetMJ} this week — over limit ⚠`;
    return `${ctx.substances.week} taper.\n${nicoStatus}\n${mjStatus}\n\nSchedule: Nico reduces 1/day per week (6→0 by Week 7). MJ reduces 1/week per week (4→0 by Week 5). Stopping MJ is your fastest path to T recovery — LH normalises within 2-3 weeks.`;
  }

  // ── TASKS / TODAY ──
  if (q.match(/task|today|daily|focus|what should|priority|what to/)) {
    const pending = TASKS.filter(t => !gd('daily.tasks.' + t.id, false));
    const priority = ctx.weekPriority ? `\n\nThis week&#39;s priority: "${ctx.weekPriority}"` : '';
    if (pending.length === 0) return `All ${ctx.tasks.total} tasks done today. ✓ ${ctx.meds.done}/${ctx.meds.total} meds taken. Water: ${ctx.water}/10.${priority}`;
    return `${ctx.tasks.done}/${ctx.tasks.total} tasks done. Still pending: ${pending.map(t => t.label.replace(/^[^\s]+\s/, '')).join(', ')}.\n\nMeds: ${ctx.meds.done}/${ctx.meds.total}. Water: ${ctx.water}/10.${priority}`;
  }

  // ── GOALS ──
  if (q.match(/goal|milestone|achiev/)) {
    const catCounts = GOAL_CATS.filter(c => c.id !== 'all').map(c => {
      const total = ALL_GOALS.filter(g => g.cat === c.id).length;
      const done = ALL_GOALS.filter(g => g.cat === c.id && gd('goals.' + g.id, false)).length;
      return `${c.label}: ${done}/${total}`;
    }).join(' · ');
    return `Goals: ${ctx.goals.achieved}/${ctx.goals.total} achieved (${ctx.goals.pct}%).\n${catCounts}\n\nMost impactful right now: sleep → T recovery (physical goals), MJ taper → T (substance goals), and logging daily for 7 days (personal goals).`;
  }

  // ── INTIMACY ──
  if (q.match(/intimacy|intimate|step|sexual|wife|partner/)) {
    return `Intimacy: ${ctx.intimacy.stepsComplete}/${ctx.intimacy.total} steps complete. Current: ${ctx.intimacy.currentStep}. Small steps done today: ${['ss1','ss2','ss3','ss4','ss5','ss6','ss7'].filter(id=>gd('int.small.'+TODAY_S+'.'+id,false)).length}/7.`;
  }

  // ── RIXTRACE ──
  if (q.match(/rixtrace|rix|build|product|dark web|sprint/)) {
    const buildStr = ctx.rixtrace.todayLog ? `Today: "${ctx.rixtrace.todayLog}"` : 'No build log entry today.';
    const blockerStr = ctx.rixtrace.blocker ? ` Blocker: ${ctx.rixtrace.blocker}` : '';
    return `RixTrace: ${ctx.rixtrace.sprintsDone}/${ctx.rixtrace.total} sprints done. ${buildStr}${blockerStr}\n\nCritical path: Celery → Tor proxy → psbdmp unblocked → Telegram. Discord can defer to v1.1.`;
  }

  // ── WHITE PAPERS ──
  if (q.match(/paper|wp|white paper|writing|ctem|xdr/)) {
    const todayTask = DAY_NUM >= 1 && DAY_NUM <= 28 ? WP1_DAILY[DAY_NUM] : null;
    const taskDone = todayTask ? gd('wp1.daily.' + DAY_NUM, false) : false;
    return `WP1: ${ctx.papers.wp1DaysDone}/${ctx.papers.target} daily tasks done.${todayTask ? '\n\nToday&#39;s task: ' + todayTask + (taskDone ? ' ✓' : ' — not done yet.') : ''}`;
  }

  // ── WEIGHT ──
  if (q.match(/weight|kg|kilo|fat|body/)) {
    const wt = gd('wt.logs', []);
    if (!wt.length) return `No weight logged yet. Log every Monday morning before eating. Target: lose 4kg by Aug 30.`;
    const latest = wt[0];
    const change = wt.length > 1 ? (latest.val - wt[wt.length-1].val).toFixed(1) : null;
    return `Current weight: ${latest.val}kg (${latest.date}). ${change !== null ? (parseFloat(change) < 0 ? `Down ${Math.abs(change)}kg from first reading.` : `Up ${change}kg from first reading.`) : ''} Target: -4kg by Aug 30. Log every Monday.`;
  }

  // ── WHAT SHOULD I FIX / IMPROVE ──
  if (q.match(/fix|improve|worst|weakest|problem|issue|drag/)) {
    const issues = [];
    if (!ctx.sleep.onTrack) issues.push(`Sleep (${ctx.sleep.avg7.toFixed(1)}h avg, need 7h) — this drives 40% of T recovery`);
    if (!ctx.exercise.onTrack) issues.push(`Exercise (${ctx.exercise.thisWeek}/4 this week)`);
    if (!ctx.substances.onTrack) issues.push(`Substances (over taper limit)`);
    if (!ctx.glucose.onTrack) issues.push(`Glucose (${ctx.glucose.last || 'not logged'})`);
    if (ctx.tasks.done < ctx.tasks.total) issues.push(`${ctx.tasks.total - ctx.tasks.done} daily tasks pending`);
    if (!issues.length) return `Everything is on track today. Keep going.`;
    return `Priority order to fix:\n${issues.map((x, i) => `${i+1}. ${x}`).join('\n')}\n\nFix sleep first — it cascades into everything else.`;
  }

  // ── WEEKLY REVIEW ──
  if (q.match(/week|review|last week|momentum/)) {
    const priority = ctx.weekPriority || 'not set';
    return `Week ${Math.ceil(DAY_NUM/7)} of ${Math.ceil(ctx.totalDays/7)}. This week&#39;s priority: "${priority}".\nExercise this week: ${ctx.exercise.thisWeek}/4. Sleep avg: ${ctx.sleep.avg7 > 0 ? ctx.sleep.avg7.toFixed(1)+'h' : 'not enough data'}.\n\nOpen the Weekly Review tab every Sunday to log what helped, what got in the way, and set next week&#39;s priority.`;
  }

  // ── DEFAULT — rich snapshot ──
  const topIssue = !ctx.sleep.onTrack ? `sleep (${ctx.sleep.avg7 > 0 ? ctx.sleep.avg7.toFixed(1)+'h avg' : 'not logged'})` : !ctx.exercise.onTrack ? `exercise (${ctx.exercise.thisWeek}/4 this week)` : !ctx.substances.onTrack ? 'substance taper' : null;
  return `Day ${ctx.day} · ${ctx.overall}% overall · T projected ${ctx.testosterone.proj45d} ng/dL at 45d.\n\nTasks: ${ctx.tasks.done}/${ctx.tasks.total} · Sleep: ${ctx.sleep.avg7 > 0 ? ctx.sleep.avg7.toFixed(1)+'h' : '—'} · Exercise: ${ctx.exercise.thisWeek}/4 this week · Nico: ${ctx.substances.todayNico}/${ctx.substances.targetNico}${topIssue ? '\n\nBiggest drag right now: ' + topIssue + '.' : ' ✓'}\n\nAsk me about sleep, exercise, testosterone, glucose, taper, goals, tasks, RixTrace, or weekly review.`;
}

function toggleNX(){
  const panel = document.getElementById('nx-panel');
  panel.classList.toggle('open');
  if(panel.classList.contains('open') && NX_HISTORY.length === 0){
    ensureDaily();
    const ctx = buildNXContext();
    const topIssue = !ctx.sleep.onTrack ? `Sleep avg ${ctx.sleep.avg7 > 0 ? ctx.sleep.avg7.toFixed(1)+'h' : 'not logged'} — fix this first.` : !ctx.exercise.onTrack ? `Exercise ${ctx.exercise.thisWeek}/4 this week — need ${4-ctx.exercise.thisWeek} more.` : ctx.substances.onTrack ? 'All inputs on track.' : 'Taper check needed.';
    document.getElementById('nx-msgs').innerHTML = `<div class="nxm ai"><strong style="color:var(--purple)">Neurix · Day ${ctx.day}</strong><br>${ctx.overall}% overall · T projected ${ctx.testosterone.proj45d} ng/dL at 45d · ${ctx.goals.achieved}/${ctx.goals.total} goals.<br><br>${topIssue}<br><br>Ask me anything — sleep, exercise, T recovery, taper, goals, RixTrace, weekly review.</div>`;
  }
}

function sendNX(){
  const inp = document.getElementById('nx-inp');
  const msg = inp.value.trim();
  if(!msg) return;
  inp.value = '';
  const msgs = document.getElementById('nx-msgs');
  msgs.innerHTML += `<div class="nxm user">${msg}</div>`;
  NX_HISTORY.push({role:'user', content:msg});
  msgs.scrollTop = msgs.scrollHeight;

  // Build context fresh on every message
  const ctx = buildNXContext();
  const answer = nxAnswer(msg, ctx);

  setTimeout(()=>{
    msgs.innerHTML += `<div class="nxm ai">${answer.replace(/\n/g,'<br>')}</div>`;
    msgs.scrollTop = msgs.scrollHeight;
    NX_HISTORY.push({role:'assistant', content:answer});
  }, 300);
}

function renderExCal(){
  const logs = gd('ex.logs',[]);
  const now = new Date();
  const yr = now.getFullYear();
  const mo = now.getMonth();
  const firstDay = new Date(yr, mo, 1);
  const lastDay  = new Date(yr, mo+1, 0);
  // Mon-start offset
  const offset = (firstDay.getDay()+6)%7;
  const totalCells = offset + lastDay.getDate();
  const cells = Math.ceil(totalCells/7)*7;

  // ── Session calendar (#ex-cal) ──
  const cal = document.getElementById('ex-cal');
  if(cal){
    let html = '';
    for(let i=0;i<cells;i++){
      if(i<offset){ html+=`<div></div>`; continue; }
      const day = i-offset+1;
      if(day>lastDay.getDate()){ html+=`<div></div>`; continue; }
      const ds = `${yr}-${String(mo+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const dayLogs = logs.filter(l=>l.date===ds);
      const hasEx = dayLogs.length>0;
      const dur = dayLogs.reduce((a,l)=>a+l.dur,0);
      const isToday = ds===TODAY_S;
      const isFuture = day>now.getDate() && mo>=now.getMonth() && yr>=now.getFullYear();
      const p = Math.min(100,Math.round(dur/45*100));
      const bg = hasEx ? `rgba(74,126,224,${0.1+p/200})` : 'rgba(255,255,255,.03)';
      const border = isToday ? 'var(--blue)' : hasEx ? 'rgba(74,126,224,.4)' : 'rgba(255,255,255,.06)';
      const textC = isToday ? 'var(--blue)' : hasEx ? '#fff' : 'rgba(255,255,255,.2)';
      html+=`<div style="aspect-ratio:1;border-radius:5px;background:${bg};border:1px solid ${border};display:flex;align-items:center;justify-content:center;font-size:9px;font-family:monospace;color:${textC};cursor:default;position:relative" title="${hasEx?dur+'min':''}">${day}${hasEx?`<div style="position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:3px;height:3px;border-radius:50%;background:var(--blue)"></div>`:''}</div>`;
    }
    cal.innerHTML = html;
  }

  // ── Ring calendar (#ex-ring-cal) ──
  const ringCal = document.getElementById('ex-ring-cal');
  if(ringCal){
    let html = '';
    for(let i=0;i<cells;i++){
      if(i<offset){ html+=`<div></div>`; continue; }
      const day = i-offset+1;
      if(day>lastDay.getDate()){ html+=`<div></div>`; continue; }
      const ds = `${yr}-${String(mo+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const dayLogs = logs.filter(l=>l.date===ds);
      const dur = dayLogs.reduce((a,l)=>a+l.dur,0);
      const hasEx = dayLogs.length>0;
      const p = Math.min(100,Math.round(dur/45*100));
      const isToday = ds===TODAY_S;
      const C2 = 2*Math.PI*11;
      const off = C2*(1-p/100);
      html+=`<div style="display:flex;flex-direction:column;align-items:center;gap:1px;padding:2px 1px">
        <svg width="26" height="26" viewBox="0 0 26 26">
          <circle cx="13" cy="13" r="11" fill="none" stroke="rgba(255,61,95,.12)" stroke-width="4"/>
          ${hasEx?`<circle cx="13" cy="13" r="11" fill="none" stroke="#ff375f" stroke-width="4" stroke-linecap="round" stroke-dasharray="${C2}" stroke-dashoffset="${off}" transform="rotate(-90 13 13)"/>`:``}
          <text x="13" y="16" text-anchor="middle" fill="${hasEx?'#ff375f':'rgba(255,255,255,.15)'}" font-size="7" font-family="monospace">${hasEx?dur:'·'}</text>
        </svg>
        <div style="font-size:7px;color:${isToday?'rgba(201,150,90,.8)':'rgba(255,255,255,.25)'};font-family:monospace">${day}</div>
      </div>`;
    }
    ringCal.innerHTML = html;
  }
}

// PIN LOCK SYSTEM
// ═══════════════════════════════════════════════════════
let _pinBuffer  = '';
let _pinMode    = 'unlock'; // 'unlock' | 'set' | 'confirm' | 'change_old' | 'change_new' | 'change_confirm'
let _pinConfBuf = '';
let _pinUnlocked = false;

// SHA-256 hash using Web Crypto API
async function sha256(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function pinGetStored(){ return localStorage.getItem('pev2_pin'); }
function pinSetStored(hash){ localStorage.setItem('pev2_pin', hash); }

function pinUpdateDots(buf, state){
  for(let i=0;i<6;i++){
    const dot = document.getElementById('pd'+i);
    dot.className = 'pin-dot';
    if(state==='error') dot.classList.add('error');
    else if(i < buf.length) dot.classList.add('filled');
  }
}

function pinMsg(msg, type){
  const el = document.getElementById('pin-msg');
  el.textContent = msg;
  el.className = 'pin-msg' + (type?' '+type:'');
}

function pinKey(k){
  if(_pinBuffer.length >= 6) return;
  _pinBuffer += k;
  pinUpdateDots(_pinBuffer);
  if(_pinBuffer.length === 6) setTimeout(pinSubmit, 80);
}

function pinDel(){
  if(_pinBuffer.length > 0){
    _pinBuffer = _pinBuffer.slice(0,-1);
    pinUpdateDots(_pinBuffer);
  }
}

async function pinSubmit(){
  const hash = await sha256(_pinBuffer);
  const stored = pinGetStored();

  if(_pinMode === 'unlock'){
    if(!stored){
      // No PIN set yet — switch to set mode
      _pinMode = 'set';
      _pinBuffer = '';
      document.getElementById('pin-title').textContent = 'Set a 6-digit PIN';
      pinMsg('Choose a PIN you\'ll remember');
      pinUpdateDots('');
      return;
    }
    if(hash === stored){
      pinUnlockSuccess();
    } else {
      pinWrongPIN();
    }

  } else if(_pinMode === 'set'){
    _pinConfBuf = _pinBuffer;
    _pinBuffer = '';
    _pinMode = 'confirm';
    document.getElementById('pin-title').textContent = 'Confirm PIN';
    pinMsg('Enter the same PIN again');
    pinUpdateDots('');

  } else if(_pinMode === 'confirm'){
    if(_pinBuffer === _pinConfBuf){
      pinSetStored(hash);
      _pinMode = 'unlock';
      _pinBuffer = '';
      _pinConfBuf = '';
      document.getElementById('pin-title').textContent = 'Enter PIN';
      pinMsg('PIN set! Enter it to continue', 'success');
      pinUpdateDots('');
    } else {
      _pinBuffer = '';
      _pinMode = 'set';
      _pinConfBuf = '';
      document.getElementById('pin-title').textContent = 'Set a 6-digit PIN';
      pinUpdateDots('', 'error');
      pinMsg('PINs did not match — try again', 'error');
      setTimeout(()=>pinUpdateDots(''), 400);
    }

  } else if(_pinMode === 'change_old'){
    if(hash === stored){
      _pinBuffer = '';
      _pinMode = 'change_new';
      document.getElementById('pin-title').textContent = 'New PIN';
      pinMsg('Enter your new 6-digit PIN');
      pinUpdateDots('');
    } else {
      pinWrongPIN();
    }

  } else if(_pinMode === 'change_new'){
    _pinConfBuf = _pinBuffer;
    _pinBuffer = '';
    _pinMode = 'change_confirm';
    document.getElementById('pin-title').textContent = 'Confirm New PIN';
    pinMsg('Enter new PIN again');
    pinUpdateDots('');

  } else if(_pinMode === 'change_confirm'){
    if(_pinBuffer === _pinConfBuf){
      pinSetStored(hash);
      _pinBuffer = '';
      _pinConfBuf = '';
      _pinMode = 'unlock';
      document.getElementById('pin-title').textContent = 'Enter PIN';
      pinMsg('PIN changed ✓', 'success');
      pinUpdateDots('');
      setTimeout(()=>pinMsg(''), 2000);
      document.getElementById('pin-screen').classList.add('unlocked');
    } else {
      _pinBuffer = '';
      _pinMode = 'change_new';
      _pinConfBuf = '';
      pinUpdateDots('', 'error');
      pinMsg('PINs did not match — try again', 'error');
      setTimeout(()=>pinUpdateDots(''), 400);
    }
  }
}

function pinWrongPIN(){
  pinUpdateDots('●●●●●●', 'error');
  pinMsg('Incorrect PIN', 'error');
  _pinBuffer = '';
  setTimeout(()=>{
    pinUpdateDots('');
    pinMsg('');
  }, 700);
}

function pinUnlockSuccess(){
  _pinUnlocked = true;
  pinMsg('', 'success');
  const screen = document.getElementById('pin-screen');
  screen.classList.add('pin-unlocking');
  document.getElementById('pin-change-btn').style.display = 'block';
  setTimeout(()=>{
    screen.classList.add('unlocked');
    screen.classList.remove('pin-unlocking');
  }, 250);
}

function pinStartChange(){
  const screen = document.getElementById('pin-screen');
  screen.classList.remove('unlocked');
  _pinMode = 'change_old';
  _pinBuffer = '';
  document.getElementById('pin-title').textContent = 'Enter Current PIN';
  pinMsg('Confirm your current PIN first');
  pinUpdateDots('');
  document.getElementById('pin-change-btn').style.display = 'none';
}

// Keyboard support
document.addEventListener('keydown', function(e){
  if(document.getElementById('pin-screen').classList.contains('unlocked')) return;
  if(e.key >= '0' && e.key <= '9') pinKey(e.key);
  if(e.key === 'Backspace') pinDel();
});

// Boot: initialise PIN screen — called from DOMContentLoaded
function initPIN(){
  const stored = pinGetStored();
  if(!stored){
    _pinMode = 'set';
    document.getElementById('pin-title').textContent = 'Set a 6-digit PIN';
    pinMsg('First time? Choose a PIN to protect your data');
  } else {
    _pinMode = 'unlock';
    document.getElementById('pin-title').textContent = 'Enter PIN';
    document.getElementById('pin-change-btn').style.display = 'none';
  }
}
